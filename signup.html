<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUDOHAGE | Create Account</title>

<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ea;
--text:#111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Manrope',sans-serif;
color:var(--text);
min-height:100vh;
overflow:hidden;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
padding:1.2rem 2rem;
background:rgba(246,242,234,.65);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:999;
}

.logo{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2rem;
font-weight:600;
}

.container{
min-height:calc(100vh - 100px);
display:grid;
grid-template-columns:1.2fr 0.8fr;
align-items:center;
padding:100px 8%;
gap:80px;
}

.left h1{
font-family:'Cormorant Garamond',serif;
font-size:6rem;
line-height:0.95;
margin-bottom:25px;
}

.left p{
font-size:17px;
opacity:.65;
max-width:500px;
line-height:1.8;
}

.badge{
display:inline-block;
margin-bottom:20px;
font-size:12px;
letter-spacing:4px;
opacity:.5;
}

.card{
background:white;
padding:45px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

.card h2{
font-family:'Cormorant Garamond',serif;
font-size:2.5rem;
margin-bottom:25px;
}

.input{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
outline:none;
background:#f7f7f7;
border-radius:14px;
font-size:15px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:#111;
color:white;
font-size:13px;
letter-spacing:3px;
margin-top:10px;
}

.google-btn{
width:100%;
padding:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:#f2f2f2;
font-size:14px;
margin-top:12px;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
text-decoration:none;
color:#111;
opacity:.6;
}

.blur-circle{
position:fixed;
width:400px;
height:400px;
background:white;
border-radius:50%;
filter:blur(120px);
top:-100px;
right:-100px;
opacity:.5;
pointer-events:none;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
gap:40px;
padding:110px 25px 40px;
}

.left h1{
font-size:3.5rem;
}

.card{
padding:30px;
}

}

@media (max-width: 900px){

body{
overflow-y:auto;
overflow-x:hidden;
}

.container{
grid-template-columns:1fr;
padding:100px 20px 40px;
gap:25px;
min-height:auto;
}

.left{
text-align:center;
}

.left h1{
font-size:3.2rem;
line-height:1;
margin-bottom:15px;
}

.left p{
font-size:14px;
max-width:100%;
}

.badge{
font-size:11px;
letter-spacing:3px;
}

.card{
width:100%;
max-width:100%;
padding:28px;
border-radius:24px;
}

.card h2{
font-size:2rem;
text-align:center;
}

.input{
padding:16px;
font-size:16px;
}

.btn,
.google-btn{
padding:16px;
font-size:13px;
}

.logo{
font-size:1.7rem;
}

.blur-circle{
width:250px;
height:250px;
filter:blur(90px);
}

}

@media (max-width: 480px){

.header{
padding:1rem 1.2rem;
}

.container{
padding:90px 15px 30px;
}

.left h1{
font-size:2.5rem;
}

.left p{
font-size:13px;
line-height:1.7;
}

.card{
padding:22px;
}

.card h2{
font-size:1.8rem;
}

.input{
padding:15px;
}

.btn,
.google-btn{
padding:15px;
}

}

.btn-spinner{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,.4);
border-top:2px solid #ffffff;
border-radius:50%;
display:inline-block;
animation:btnSpin .7s linear infinite;
vertical-align:middle;
}

.google-btn .btn-spinner{
border:2px solid rgba(0,0,0,.2);
border-top:2px solid #111;
}

@keyframes btnSpin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.page-loader{
position:fixed;
inset:0;
background:rgba(246,242,234,.95);
backdrop-filter:blur(10px);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:99999;
gap:18px;
}

.page-loader .loader{
width:46px;
height:46px;
border:3px solid #ddd;
border-top:3px solid #111;
border-radius:50%;
animation:pageSpin 1s linear infinite;
}

.page-loader span{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
opacity:.6;
}

@keyframes pageSpin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="blur-circle"></div>

<div class="page-loader" id="pageLoader">
  <div class="loader"></div>
  <span>Preparing Your Account...</span>
</div>

<header class="header">
<a href="index.html" class="logo">RUDOHAGE</a>
</header>

<div class="container">

<div class="left">

<div class="badge">
COLLECTOR REGISTRATION
</div>

<h1>
Create<br>
Your Archive
</h1>

<p>
Begin your journey with RUDOHAGE.
Create your collector account to track orders,
manage acquisitions and access future releases.
</p>

</div>

<div class="card">

<h2>Create Account</h2>

<input
type="email"
class="input"
placeholder="Email Address"
id="email">

<input
type="password"
class="input"
placeholder="Password"
id="password">

<input
type="password"
class="input"
placeholder="Confirm Password"
id="confirmPassword">

<button class="btn" id="signupBtn">
CREATE ACCOUNT
</button>

<button class="google-btn" id="googleBtn">
Sign Up With Google
</button>

<div class="links">
<a href="login.html">
Already have an account? Login
</a>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import {
getFirestore,
doc,
getDoc,
setDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "rudohage.firebaseapp.com",
projectId: "rudohage",
storageBucket: "rudohage.firebasestorage.app",
messagingSenderId: "487042116246",
appId: "1:487042116246:web:990d65636addd6d653f0b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const redirectTo = params.get("redirect");
const OTP_API_BASE = "https://razorpay-backend-6yg5.onrender.com";

function goToVerifyEmail(){
let url = "verify-email.html";
if(redirectTo){
url += "?redirect=" + encodeURIComponent(redirectTo);
}
window.location.href = url;
}

function setBtnLoading(btn, isLoading){
if(isLoading){
btn.dataset.originalText = btn.innerHTML;
btn.innerHTML = '<span class="btn-spinner"></span>';
btn.disabled = true;
}else{
btn.innerHTML = btn.dataset.originalText;
btn.disabled = false;
}
}

document.getElementById("signupBtn").addEventListener("click", async()=>{
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;

if(!email || !password){
alert("Please fill all fields");
return;
}

if(password !== confirmPassword){
alert("Passwords do not match");
return;
}

const signupBtn = document.getElementById("signupBtn");
setBtnLoading(signupBtn, true);

try{
const userCredential = await createUserWithEmailAndPassword(auth, email, password);

document.getElementById("pageLoader").style.display = "flex";

await setDoc(doc(db,"users",userCredential.user.uid), {
email: userCredential.user.email,
emailVerified: false,
createdAt: serverTimestamp()
});

try{
await fetch(OTP_API_BASE + "/send-otp", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({ email: userCredential.user.email })
});
}catch(otpError){
console.log(otpError);
}

goToVerifyEmail();
}catch(error){
setBtnLoading(signupBtn, false);
document.getElementById("pageLoader").style.display = "none";
alert(error.message);
}
});

document.getElementById("googleBtn").addEventListener("click", async()=>{
const googleBtn = document.getElementById("googleBtn");
setBtnLoading(googleBtn, true);

try{
const provider = new GoogleAuthProvider();
const result = await signInWithPopup(auth, provider);

document.getElementById("pageLoader").style.display = "flex";

const userRef = doc(db,"users",result.user.uid);
const userSnap = await getDoc(userRef);

if(!userSnap.exists()){
await setDoc(userRef, {
email: result.user.email,
emailVerified: false, // Strict locking rule enabled
createdAt: serverTimestamp()
});

try {
await fetch(OTP_API_BASE + "/send-otp", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({ email: result.user.email })
});
} catch(otpError) {
console.log(otpError);
}

goToVerifyEmail();
} else {
const existingData = userSnap.data();
if(existingData && existingData.emailVerified === true){
if(redirectTo) window.location.href = decodeURIComponent(redirectTo);
else window.location.href = "myaccount.html";
} else {
goToVerifyEmail();
}
}
}catch(error){
setBtnLoading(googleBtn, false);
document.getElementById("pageLoader").style.display = "none";
alert(error.message);
}
});

</script>
<script src="/toast.js"></script>
</body>
</html>
