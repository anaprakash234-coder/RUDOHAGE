<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUDOHAGE | Create Account</title>

<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ea;
--text:#111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Manrope',sans-serif;
color:var(--text);
min-height:100vh;
overflow:hidden;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
padding:1.2rem 2rem;
background:rgba(246,242,234,.65);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:999;
}

.logo{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2rem;
font-weight:600;
}

.container{
min-height:100vh;
display:grid;
grid-template-columns:1.2fr 0.8fr;
align-items:center;
padding:100px 8%;
gap:80px;
}

.left h1{
font-family:'Cormorant Garamond',serif;
font-size:6rem;
line-height:0.95;
margin-bottom:25px;
}

.left p{
font-size:17px;
opacity:.65;
max-width:500px;
line-height:1.8;
}

.badge{
display:inline-block;
margin-bottom:20px;
font-size:12px;
letter-spacing:4px;
opacity:.5;
}

.card{
background:white;
padding:45px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

.card h2{
font-family:'Cormorant Garamond',serif;
font-size:2.5rem;
margin-bottom:25px;
}

.input{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
outline:none;
background:#f7f7f7;
border-radius:14px;
font-size:15px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:#111;
color:white;
font-size:13px;
letter-spacing:3px;
margin-top:10px;
}

.google-btn{
width:100%;
padding:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:#f2f2f2;
font-size:14px;
margin-top:12px;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
text-decoration:none;
color:#111;
opacity:.6;
}

.blur-circle{
position:fixed;
width:400px;
height:400px;
background:white;
border-radius:50%;
filter:blur(120px);
top:-100px;
right:-100px;
opacity:.5;
pointer-events:none;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
gap:40px;
padding:110px 25px 40px;
}

.left h1{
font-size:3.5rem;
}

.card{
padding:30px;
}

}

</style>

</head>

<body>

<div class="blur-circle"></div>

<header class="header">
<a href="index.html" class="logo">RUDOHAGE</a>
</header>

<div class="container">

<div class="left">

<div class="badge">
COLLECTOR REGISTRATION
</div>

<h1>
Create<br>
Your Archive
</h1>

<p>
Begin your journey with RUDOHAGE.
Create your collector account to track orders,
manage acquisitions and access future releases.
</p>

</div>

<div class="card">

<h2>Create Account</h2>

<input
type="email"
class="input"
placeholder="Email Address"
id="email">

<input
type="password"
class="input"
placeholder="Password"
id="password">

<input
type="password"
class="input"
placeholder="Confirm Password"
id="confirmPassword">

<button class="btn" id="signupBtn">
CREATE ACCOUNT
</button>

<button class="google-btn" id="googleBtn">
Sign Up With Google
</button>

<div class="links">
<a href="login.html">
Already have an account? Login
</a>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "1:487042116246:web:990d65636addd6d653f0b7",
appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

document.getElementById("signupBtn")
.addEventListener("click", async()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const confirmPassword =
document.getElementById("confirmPassword").value;

if(!email || !password){
alert("Please fill all fields");
return;
}

if(password !== confirmPassword){
alert("Passwords do not match");
return;
}

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

window.location.href =
"my-orders.html";

}catch(error){

alert(error.message);

}

});

document.getElementById("googleBtn")
.addEventListener("click", async()=>{

try{

const provider =
new GoogleAuthProvider();

await signInWithPopup(
auth,
provider
);

window.location.href =
"my-orders.html";

}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
