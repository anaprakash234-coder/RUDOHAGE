<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="/logo.png"><title id="pageTitle">RUDOHAGE</title><meta name="description" id="pageDesc" content="Loading..."><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6f2ea;font-family:'Manrope',sans-serif;color:#111;line-height:1.5;overflow-x:hidden}.glow{position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(164,139,116,.12),transparent 70%);pointer-events:none;z-index:0}.hdr{position:fixed;top:0;left:0;width:100%;z-index:999;padding:12px 28px;background:rgba(246,242,234,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.04);display:flex;justify-content:space-between;align-items:center}.brand{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;text-decoration:none;color:#111;letter-spacing:-.5px}.back{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;color:rgba(0,0,0,.45);transition:.3s}.back:hover{color:#111}.wrap{max-width:750px;margin:0 auto;padding:90px 18px 30px;position:relative;z-index:1}.hero{text-align:center;margin-bottom:28px}.hero span{font-size:9px;letter-spacing:4px;opacity:.35;text-transform:uppercase}.hero h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-style:italic;margin:4px 0}.hero p{font-size:.72rem;opacity:.45;max-width:400px;margin:auto;line-height:1.6}.divider{width:50px;height:1.5px;background:#a48b74;margin:22px auto;opacity:.4}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}.card{background:#fff;border-radius:16px;padding:20px 22px;box-shadow:0 3px 16px rgba(0,0,0,.03);position:relative;overflow:hidden}.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#a48b74,transparent)}.card h2{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;margin-bottom:14px}.card p.info{font-size:.68rem;opacity:.45;line-height:1.7;margin-bottom:16px}.info-item{margin-bottom:12px}.info-item .lbl{font-size:.58rem;letter-spacing:2px;opacity:.35;text-transform:uppercase;margin-bottom:2px}.info-item .val{font-size:.75rem;font-weight:500}.card input,.card textarea{width:100%;padding:10px 13px;margin-bottom:10px;border:none;background:#f5f3ef;border-radius:10px;font-size:.75rem;font-family:'Manrope',sans-serif;outline:none;transition:.3s}.card input:focus,.card textarea:focus{background:#eeeae3}.card textarea{resize:vertical;min-height:80px}.submit-btn{width:100%;padding:11px;background:#a48b74;color:#fff;border:none;border-radius:50px;cursor:pointer;font-size:.72rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:'Manrope',sans-serif;transition:.3s;margin-top:2px}.submit-btn:hover{background:#8a715c;transform:translateY(-2px)}.sig{text-align:center;padding:28px 0 10px}.sig p{font-size:.6rem;letter-spacing:3px;opacity:.2;text-transform:uppercase}.sig h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem}.loading{text-align:center;padding:20px 0;opacity:.4}.spinner{animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}@media(max-width:650px){.grid{grid-template-columns:1fr}.wrap{padding:80px 12px 20px}.hero h1{font-size:1.5rem}}</style></head><body><div class="glow"></div><header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back">← Back</a></header><div class="wrap"><div class="hero"><span id="pageTag">Contact</span><h1 id="pageTitleHero">Get In Touch</h1><p id="pageSub">For inquiries, custom requests or support — we're here to assist.</p></div><div class="divider"></div><div id="pageContent"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div><div class="sig"><p>Not Produced. Crafted.</p><h2>RUDOHAGE</h2></div></div>
<script>
const BACKEND = "https://razorpay-backend-6yg5.onrender.com";
const slug = window.location.pathname.split('/').filter(Boolean)[0] || 'contact';
const titles = {"terms-policy":"Legal","shipping":"Shipping","refund-policy":"Policy","privacy-policy":"Privacy","contact":"Contact"};
const subs = {
  "terms-policy":"By placing an order, you agree to these terms governing every handcrafted RUDOHAGE creation.",
  "shipping":"Every piece is handcrafted, inspected, and packaged before dispatch.",
  "refund-policy":"Every piece is handcrafted individually. Please review our refund guidelines before ordering.",
  "privacy-policy":"How RUDOHAGE collects, uses, and protects your personal information.",
  "contact":"For inquiries, custom requests or support — we're here to assist."
};

// ===== LOAD CONTACT PAGE =====
async function loadContactPage() {
  try {
    const res = await fetch(`${BACKEND}/api/pages/${slug}`);
    const data = await res.json();
    if (!data.success || !data.page) throw new Error('Page not found');
    const { title, content, metaDescription } = data.page;
    document.title = `${title} | RUDOHAGE`;
    document.getElementById('pageDesc').content = metaDescription || title;
    document.getElementById('pageTag').textContent = titles[slug] || 'Page';
    document.getElementById('pageTitleHero').textContent = title;
    document.getElementById('pageSub').textContent = subs[slug] || '';
    
    const contactHTML = `
      <div class="grid">
        <div class="card"><h2>Contact Info</h2><p class="info">We respond within 24–48 business hours.</p>
          <div class="info-item"><div class="lbl">Email</div><div class="val">rudohage.com12@gmail.com</div></div>
          <div class="info-item"><div class="lbl">Location</div><div class="val">Gurugram, Haryana, India</div></div>
          <div class="info-item"><div class="lbl">Hours</div><div class="val">Mon–Sat, 10AM–7PM</div></div>
        </div>
        <div class="card"><h2>Send Message</h2>
          <form id="contactForm">
            <input id="name" placeholder="Your Name" required>
            <input id="email" type="email" placeholder="Your Email" required>
            <input id="subject" placeholder="Subject" required>
            <textarea id="message" placeholder="Your Message..." required></textarea>
            <button type="submit" class="submit-btn" id="sendBtn">Send Message</button>
          </form>
        </div>
      </div>
    `;
    document.getElementById('pageContent').innerHTML = contactHTML;
    setupFormHandler();
  } catch (err) {
    document.getElementById('pageContent').innerHTML = '<div class="card"><p>Page not found. <a href="/" style="color:#a48b74;">Go back home</a>.</p></div>';
  }
}

// ===== ULTIMATE FORM HANDLER (Reload Approach) =====
function setupFormHandler() {
  const form = document.getElementById("contactForm");
  if (!form) return;
  
  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const btn = document.getElementById("sendBtn");
    const nameInp = document.getElementById("name");
    const emailInp = document.getElementById("email");
    const subjectInp = document.getElementById("subject");
    const messageInp = document.getElementById("message");

    const name = nameInp.value.trim();
    const email = emailInp.value.trim();
    const subject = subjectInp.value.trim();
    const message = messageInp.value.trim();

    if (!name || !email || !subject || !message) {
      if (window.toast) toast("Please fill all fields", "warning");
      else alert("Please fill all fields");
      return;
    }

    btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Sending...`;
    btn.disabled = true;

    try {
      const res = await fetch(`${BACKEND}/api/contact`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, subject, message })
      });
      const data = await res.json();

      if (data.success) {
        if (window.toast) toast("✅ Message sent successfully!", "success");
        else alert("Message sent successfully!");
        
        // ===== ULTIMATE RESET =====
        // 1. Clear manually
        nameInp.value = "";
        emailInp.value = "";
        subjectInp.value = "";
        messageInp.value = "";
        
        // 2. Show Sent ✓
        btn.innerHTML = `✅ Sent ✓`;
        btn.disabled = true;
        
        // 3. Reload page after 3 seconds (guaranteed reset)
        setTimeout(() => {
          location.reload();
        }, 2000);
        
      } else {
        if (window.toast) toast("❌ " + (data.error || "Failed to send"), "error");
        else alert("Failed to send: " + data.error);
        btn.innerHTML = `Send Message`;
        btn.disabled = false;
      }
    } catch (err) {
      console.error(err);
      if (window.toast) toast("❌ Network error. Try again.", "error");
      else alert("Network error. Try again.");
      btn.innerHTML = `Send Message`;
      btn.disabled = false;
    }
  });
}

// ===== LOAD =====
loadContactPage();

// ===== RIGHT CLICK DISABLE =====
document.addEventListener('contextmenu', e => e.preventDefault());

// ===== KEYBOARD SHORTCUTS DISABLE =====
document.onkeydown = function(e) {
  if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
    return false;
  }
};
</script>
<script src="/toast.js"></script>
</body></html>
