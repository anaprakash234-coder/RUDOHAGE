
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUDOHAGE | Collector Access</title>

<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ea;
--text:#111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Manrope',sans-serif;
color:var(--text);
min-height:100vh;
overflow:hidden;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
padding:1.2rem 2rem;
background:rgba(246,242,234,.65);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:999;
}

.logo{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2rem;
font-weight:600;
}

.container{
min-height:calc(100vh - 100px);
display:grid;
grid-template-columns:1.2fr 0.8fr;
align-items:center;
padding:100px 8%;
gap:80px;
}

.left h1{
font-family:'Cormorant Garamond',serif;
font-size:6rem;
line-height:0.95;
margin-bottom:25px;
}

.left p{
font-size:17px;
opacity:.65;
max-width:500px;
line-height:1.8;
}

.badge{
display:inline-block;
margin-bottom:20px;
font-size:12px;
letter-spacing:4px;
opacity:.5;
}

.card{
background:white;
padding:45px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

.card h2{
font-family:'Cormorant Garamond',serif;
font-size:2.5rem;
margin-bottom:25px;
}

.input{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
outline:none;
background:#f7f7f7;
border-radius:14px;
font-size:15px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:#111;
color:white;
font-size:13px;
letter-spacing:3px;
margin-top:10px;
}

.google-btn{
width:100%;
padding:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:#f2f2f2;
font-size:14px;
margin-top:12px;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
text-decoration:none;
color:#111;
opacity:.6;
}

.blur-circle{
position:fixed;
width:400px;
height:400px;
background:white;
border-radius:50%;
filter:blur(120px);
top:-100px;
right:-100px;
opacity:.5;
pointer-events:none;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
gap:40px;
padding:110px 25px 40px;
}

.left h1{
font-size:3.5rem;
}

.card{
padding:30px;
}

}

/* MOBILE OPTIMIZATION */

@media (max-width: 900px){

body{
overflow-y:auto;
overflow-x:hidden;
}

.container{
grid-template-columns:1fr;
padding:100px 20px 40px;
gap:25px;
min-height:auto;
}

.left{
text-align:center;
}

.left h1{
font-size:3.2rem;
line-height:1;
margin-bottom:15px;
}

.left p{
font-size:14px;
max-width:100%;
}

.badge{
font-size:11px;
letter-spacing:3px;
}

.card{
width:100%;
max-width:100%;
padding:28px;
border-radius:24px;
}

.card h2{
font-size:2rem;
text-align:center;
}

.input{
padding:16px;
font-size:16px;
}

.btn,
.google-btn{
padding:16px;
font-size:13px;
}

.logo{
font-size:1.7rem;
}

.blur-circle{
width:250px;
height:250px;
filter:blur(90px);
}

}

@media (max-width: 480px){

.header{
padding:1rem 1.2rem;
}

.container{
padding:90px 15px 30px;
}

.left h1{
font-size:2.5rem;
}

.left p{
font-size:13px;
line-height:1.7;
}

.card{
padding:22px;
}

.card h2{
font-size:1.8rem;
}

.input{
padding:15px;
}

.btn,
.google-btn{
padding:15px;
}

}

</style>
</head>

<body>

<div class="blur-circle"></div>

<header class="header">
<a href="index.html" class="logo">RUDOHAGE</a>
</header>

<div class="container">

<div class="left">

<div class="badge">
COLLECTOR ACCESS
</div>

<h1>
Enter<br>
The Archive
</h1>

<p>
Access your orders, collector history and future acquisitions.
Every RUDOHAGE piece carries a story. Your archive begins here.
</p>

</div>

<div class="card">

<h2>Login</h2>

<input
type="email"
class="input"
placeholder="Email Address"
id="email">

<input
type="password"
class="input"
placeholder="Password"
id="password">

<button class="btn">
LOGIN
</button>

<button class="google-btn">
Continue With Google
</button>

<div class="links">
<a href="signup.html">
Create Account
</a>
</div>

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "rudohage.firebaseapp.com",
projectId: "rudohage",
storageBucket: "rudohage.firebasestorage.app",
messagingSenderId: "487042116246",
appId: "1:487042116246:web:990d65636addd6d653f0b7"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const ADMIN_EMAIL = "anaprakash123@gmail.com";

onAuthStateChanged(auth,(user)=>{
if(user){
if(user.email === ADMIN_EMAIL){
window.location.href = "admin-rudohage-x9k7v2-archive.html";
}else{
window.location.href = "myorders.html";
}
}
});

const loginBtn =
document.querySelector(".btn");

const googleBtn =
document.querySelector(".google-btn");

loginBtn.addEventListener("click", async()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

const userCredential =
await signInWithEmailAndPassword(
auth,
email,
password
);

if(email === ADMIN_EMAIL){

window.location.href = "admin-rudohage-x9k7v2-archive.html";

}else{

window.location.href = "myorders.html";

}

}catch(error){

alert(error.message);

}

});

document.querySelector(".google-btn").addEventListener("click", async () => {
  try {
    const provider = new GoogleAuthProvider();

    provider.setCustomParameters({
      prompt: "select_account"
    });

    const result = await signInWithPopup(auth, provider);

    const email = result.user.email;

    if (email === ADMIN_EMAIL) {
      window.location.href = "admin-rudohage-x9k7v2-archive.html";
    } else {
      window.location.href = "myorders.html";
    }

  } catch (error) {
    alert(error.message);
  }
});

</script>

</body>
</html>
