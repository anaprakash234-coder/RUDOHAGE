<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="/logo.png"><title>Verify Email | RUDOHAGE</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6f2ea;font-family:'Manrope',sans-serif;color:#111;line-height:1.5;min-height:100vh;position:relative;overflow:hidden}.noise{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");opacity:.04;pointer-events:none;z-index:0;mix-blend-mode:multiply}.glow{position:fixed;top:-250px;right:-250px;width:600px;height:600px;background:radial-gradient(circle,rgba(164,139,116,.18),transparent 65%);pointer-events:none;z-index:0;animation:glowPulse 8s infinite alternate}.glow2{position:fixed;bottom:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,0,0,.08),transparent 65%);pointer-events:none;z-index:0;animation:glowPulse 10s infinite alternate-reverse}@keyframes glowPulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.3);opacity:1}}.hdr{position:fixed;top:0;left:0;width:100%;z-index:999;padding:14px 32px;background:rgba(246,242,234,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center}.brand{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;text-decoration:none;color:#111;letter-spacing:-.5px;transition:.3s}.brand:hover{opacity:.6}.back{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;text-decoration:none;color:rgba(0,0,0,.4);transition:.3s;display:flex;align-items:center;gap:4px}.back:hover{color:#111}.back i{font-size:9px}.scheck{position:fixed;inset:0;background:#f6f2ea;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:16px}.scheck .ld{width:40px;height:40px;border:3px solid rgba(0,0,0,.08);border-top:3px solid #a48b74;border-radius:50%;animation:sp .8s linear infinite}.scheck span{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;opacity:.35}@keyframes sp{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.wrap{position:relative;z-index:1;display:none;grid-template-columns:1.1fr .9fr;gap:55px;max-width:820px;width:100%;margin:95px auto 0;padding:0 20px;align-items:center}.hero{position:relative}.hero .badge{display:inline-block;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:#a48b74;margin-bottom:14px;padding:5px 14px;border:1px solid rgba(164,139,116,.3);border-radius:50px;background:rgba(164,139,116,.05);font-weight:600}.hero h1{font-family:'Cormorant Garamond',serif;font-size:3.4rem;line-height:.92;margin-bottom:12px;font-style:italic;letter-spacing:-1.5px;position:relative}.hero h1 span{font-style:normal;font-weight:300;display:block;font-size:1.7rem;opacity:.35;letter-spacing:0;margin-top:2px}.hero p{font-size:.72rem;opacity:.4;max-width:300px;line-height:1.8;position:relative}.hero::after{content:"";position:absolute;bottom:-20px;left:0;width:60px;height:1.5px;background:#a48b74;opacity:.5}.card{background:#fff;border-radius:20px;padding:30px 28px;box-shadow:0 12px 50px rgba(0,0,0,.07);position:relative;overflow:hidden}.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:4px;background:linear-gradient(90deg,#a48b74,#8a715c,transparent)}.card-icon{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,rgba(164,139,116,.15),rgba(164,139,116,.05));display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:18px;color:#a48b74}.card h2{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;margin-bottom:4px;letter-spacing:-.5px}.card .sub{font-size:.65rem;opacity:.4;margin-bottom:20px;line-height:1.6}.otp-wrap{position:relative;margin-bottom:16px}.otp-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:14px;color:#a48b74;opacity:.5}.otp-input{width:100%;padding:15px 16px 15px 42px;border:none;background:#f8f6f2;border-radius:14px;font-size:1.4rem;text-align:center;letter-spacing:10px;font-weight:700;font-family:'Manrope',sans-serif;outline:none;transition:.3s;border:1px solid transparent}.otp-input:focus{background:#fff;border-color:#a48b74;box-shadow:0 0 0 6px rgba(164,139,116,.06);letter-spacing:8px}.btn{width:100%;padding:13px;background:linear-gradient(135deg,#111,#1a1a1a);color:#fff;border:none;border-radius:50px;cursor:pointer;font-size:.7rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;font-family:'Manrope',sans-serif;transition:.4s;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}.btn::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,#a48b74,#8a715c);opacity:0;transition:.4s}.btn:hover::before{opacity:1}.btn span{position:relative;z-index:1}.btn i{position:relative;z-index:1;font-size:13px}.btn:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(164,139,116,.3)}.resend,.links{text-align:center;margin-top:16px;font-size:.62rem;opacity:.45}.resend a,.links a{color:#111;font-weight:600;text-decoration:none;transition:.3s;position:relative}.resend a::after,.links a::after{content:"";position:absolute;bottom:-2px;left:0;width:0;height:1px;background:#a48b74;transition:.3s}.resend a:hover,.links a:hover{color:#a48b74}.resend a:hover::after,.links a:hover::after{width:100%}.resend a.disabled{opacity:.2;pointer-events:none}.btn-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top:2px solid #fff;border-radius:50%;display:inline-block;animation:sp .6s linear infinite}@media(max-width:650px){body{overflow-y:auto;overflow-x:hidden}.wrap{grid-template-columns:1fr;gap:25px;margin-top:75px}.hero{text-align:center}.hero h1{font-size:2.4rem}.hero h1 span{font-size:1.3rem}.hero p{max-width:100%;margin:0 auto}.hero::after{left:50%;transform:translateX(-50%)}.card{padding:22px 18px}}</style></head><body>
<div class="noise"></div><div class="glow"></div><div class="glow2"></div><div class="scheck" id="scheck"><div class="ld"></div><span>Verifying Session...</span></div>
<header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back"><i class="fas fa-arrow-left"></i> Back</a></header>
<div class="wrap" id="wrap"><div class="hero"><div class="badge">Final Step</div><h1>Verify Your<span>Archive Access</span></h1><p>One last check to confirm your identity and secure your collector archive.</p></div><div class="card"><div class="card-icon"><i class="fas fa-shield-halved"></i></div><h2>Enter Verification Code</h2><p class="sub">A 6-digit code was sent to <strong id="userEmail"></strong></p><div class="otp-wrap"><i class="fas fa-key"></i><input type="text" inputmode="numeric" maxlength="6" class="otp-input" placeholder="------" id="otpInput"></div><button class="btn" id="verifyBtn"><i class="fas fa-check-circle"></i> <span>Verify & Continue</span></button><div class="resend">Didn't receive code? <a href="#" id="resendBtn">Resend</a></div><div class="links"><a href="#" id="logoutLink">Switch Account</a></div></div></div>
<script>
if (window.history && window.history.replaceState) {
  window.history.replaceState(null, '', window.location.href);
}

window.addEventListener('popstate', function(event) {
  window.location.replace('/');
});
</script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";import{getFirestore,doc,getDoc,updateDoc}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
const fc={apiKey:"AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",authDomain:"rudohage.com",projectId:"rudohage",storageBucket:"rudohage.firebasestorage.app",messagingSenderId:"487042116246",appId:"1:487042116246:web:990d65636addd6d653f0b7"},app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app),API="https://razorpay-backend-6yg5.onrender.com",params=new URLSearchParams(location.search),redir=params.get("redirect");
function go(){location.href=redir?decodeURIComponent(redir):"/myaccount/"}
function btnLoad(b,l){if(l){b.dataset.html=b.innerHTML;b.innerHTML='<span class="btn-spin"></span>';b.disabled=true}else{b.innerHTML=b.dataset.html;b.disabled=false}}
let user=null;
onAuthStateChanged(auth,async u=>{if(!u){location.href="/login/";return}try{const s=await getDoc(doc(db,"users",u.uid));if(s.exists()&&s.data()?.emailVerified===true){go();return}user=u;document.getElementById("userEmail").innerText=u.email;document.getElementById("scheck").style.display="none";document.getElementById("wrap").style.display="grid"}catch(e){location.href="/login/"}});
document.getElementById("verifyBtn").addEventListener("click",async()=>{const o=document.getElementById("otpInput").value.trim();if(!o||o.length!==6){alert("Enter 6-digit code");return}const b=document.getElementById("verifyBtn");btnLoad(b,true);try{const r=await fetch(API+"/verify-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:user.email,otp:o})}),res=await r.json();if(res.success){await updateDoc(doc(db,"users",user.uid),{emailVerified:true});go()}else{btnLoad(b,false);alert(res.message||"Invalid code")}}catch(e){btnLoad(b,false);alert("Error. Try again.")}});
let cd=0,tmr=null;
document.getElementById("resendBtn").addEventListener("click",async e=>{e.preventDefault();if(cd>0)return;const b=document.getElementById("resendBtn"),orig=b.innerText;b.innerHTML='Sending...';b.classList.add("disabled");try{await fetch(API+"/send-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:user.email})});alert("Code sent!")}catch(err){b.innerText=orig;b.classList.remove("disabled");return}cd=30;b.innerText=`Wait ${cd}s`;tmr=setInterval(()=>{cd--;b.innerText=`Wait ${cd}s`;if(cd<=0){clearInterval(tmr);b.innerText="Resend";b.classList.remove("disabled")}},1000)});
document.getElementById("logoutLink").addEventListener("click",async e=>{e.preventDefault();await signOut(auth);location.href="/login/"});
</script>
