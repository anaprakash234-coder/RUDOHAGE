<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="/logo.png"><title>Verify Email | RUDOHAGE</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6f2ea;font-family:'Manrope',sans-serif;color:#111;line-height:1.5;min-height:100vh;position:relative;overflow:hidden}.glow{position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(164,139,116,.15),transparent 70%);pointer-events:none;z-index:0}.glow2{position:fixed;bottom:-150px;left:-150px;width:400px;height:400px;background:radial-gradient(circle,rgba(0,0,0,.06),transparent 70%);pointer-events:none;z-index:0}.hdr{position:fixed;top:0;left:0;width:100%;z-index:999;padding:12px 28px;background:rgba(246,242,234,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.04);display:flex;justify-content:space-between;align-items:center}.brand{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;text-decoration:none;color:#111;letter-spacing:-.5px}.back{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;color:rgba(0,0,0,.45);transition:.3s}.back:hover{color:#111}.scheck{position:fixed;inset:0;background:#f6f2ea;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:14px}.scheck .ld{width:36px;height:36px;border:3px solid #ddd;border-top:3px solid #111;border-radius:50%;animation:sp .7s linear infinite}.scheck span{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;opacity:.4}@keyframes sp{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.wrap{position:relative;z-index:1;display:grid;grid-template-columns:1.1fr .9fr;gap:50px;max-width:800px;width:100%;margin:90px auto 0;padding:0 20px;align-items:center;display:none}.hero .badge{display:inline-block;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#a48b74;margin-bottom:12px;padding:4px 12px;border:1px solid rgba(164,139,116,.25);border-radius:50px}.hero h1{font-family:'Cormorant Garamond',serif;font-size:3rem;line-height:.95;margin-bottom:10px;font-style:italic;letter-spacing:-1px}.hero h1 span{font-style:normal;font-weight:300;display:block;font-size:1.6rem;opacity:.4;letter-spacing:0}.hero p{font-size:.75rem;opacity:.45;max-width:300px;line-height:1.7}.card{background:#fff;border-radius:18px;padding:26px 24px;box-shadow:0 8px 40px rgba(0,0,0,.06);position:relative;overflow:hidden}.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#a48b74,transparent)}.card h2{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;margin-bottom:4px;letter-spacing:-.5px}.card .sub{font-size:.68rem;opacity:.45;margin-bottom:18px;line-height:1.6}.otp-input{width:100%;padding:14px;margin-bottom:14px;border:none;background:#f5f3ef;border-radius:12px;font-size:1.5rem;text-align:center;letter-spacing:8px;font-weight:700;font-family:'Manrope',sans-serif;outline:none;transition:.3s}.otp-input:focus{background:#eeeae3;box-shadow:0 0 0 3px rgba(164,139,116,.1)}.btn{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:50px;cursor:pointer;font-size:.72rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:'Manrope',sans-serif;transition:.3s;display:flex;align-items:center;justify-content:center;gap:7px}.btn:hover{background:#a48b74;transform:translateY(-2px);box-shadow:0 8px 24px rgba(164,139,116,.25)}.resend,.links{text-align:center;margin-top:14px;font-size:.65rem;opacity:.5}.resend a,.links a{color:#111;font-weight:600;text-decoration:none;transition:.3s}.resend a:hover,.links a:hover{color:#a48b74}.resend a.disabled{opacity:.3;pointer-events:none}.btn-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;display:inline-block;animation:sp .6s linear infinite}@media(max-width:650px){body{overflow-y:auto;overflow-x:hidden}.wrap{grid-template-columns:1fr;gap:22px;margin-top:70px}.hero{text-align:center}.hero h1{font-size:2.2rem}.hero h1 span{font-size:1.2rem}.hero p{max-width:100%;margin:0 auto}.card{padding:20px 16px}}</style></head><body>
<div class="glow"></div><div class="glow2"></div><div class="scheck" id="scheck"><div class="ld"></div><span>Checking Session...</span></div>
<header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back">← Back</a></header>
<div class="wrap" id="wrap"><div class="hero"><div class="badge">One Step Left</div><h1>Verify Your<span>Archive</span></h1><p>Confirm your email to join the RUDOHAGE collector archive. It only takes a moment.</p></div><div class="card"><h2>Enter Code</h2><p class="sub">6-digit code sent to <strong id="userEmail"></strong></p><input type="text" inputmode="numeric" maxlength="6" class="otp-input" placeholder="------" id="otpInput"><button class="btn" id="verifyBtn"><i class="fas fa-check"></i> Verify Code</button><div class="resend">Didn't get it? <a href="#" id="resendBtn">Resend Code</a></div><div class="links"><a href="#" id="logoutLink">Use different account</a></div></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";import{getFirestore,doc,getDoc,updateDoc}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
const fc={apiKey:"AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",authDomain:"rudohage.firebaseapp.com",projectId:"rudohage",storageBucket:"rudohage.firebasestorage.app",messagingSenderId:"487042116246",appId:"1:487042116246:web:990d65636addd6d653f0b7"},app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app),API="https://razorpay-backend-6yg5.onrender.com",params=new URLSearchParams(location.search),redir=params.get("redirect");
function go(){location.href=redir?decodeURIComponent(redir):"/myaccount/"}
function btnLoad(b,l){if(l){b.dataset.html=b.innerHTML;b.innerHTML='<span class="btn-spin"></span>';b.disabled=true}else{b.innerHTML=b.dataset.html;b.disabled=false}}
let currentUser=null;
onAuthStateChanged(auth,async u=>{if(!u){location.href="/login/";return}try{const s=await getDoc(doc(db,"users",u.uid));if(s.exists()&&s.data()?.emailVerified===true){go();return}currentUser=u;document.getElementById("userEmail").innerText=u.email;document.getElementById("scheck").style.display="none";document.getElementById("wrap").style.display="grid"}catch(e){location.href="/login/"}});
document.getElementById("verifyBtn").addEventListener("click",async()=>{const o=document.getElementById("otpInput").value.trim();if(!o||o.length!==6){alert("Enter 6-digit code");return}const b=document.getElementById("verifyBtn");btnLoad(b,true);try{const r=await fetch(API+"/verify-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:currentUser.email,otp:o})}),res=await r.json();if(res.success){await updateDoc(doc(db,"users",currentUser.uid),{emailVerified:true});go()}else{btnLoad(b,false);alert(res.message||"Invalid code")}}catch(e){btnLoad(b,false);alert("Something went wrong")}});
let cooldown=0,timer=null;
document.getElementById("resendBtn").addEventListener("click",async e=>{e.preventDefault();if(cooldown>0)return;const b=document.getElementById("resendBtn"),orig=b.innerText;b.innerHTML='Resending...';b.classList.add("disabled");try{await fetch(API+"/send-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:currentUser.email})});alert("Code sent to "+currentUser.email)}catch(err){b.innerText=orig;b.classList.remove("disabled");return}cooldown=30;b.innerText=`Resend (${cooldown}s)`;timer=setInterval(()=>{cooldown--;b.innerText=`Resend (${cooldown}s)`;if(cooldown<=0){clearInterval(timer);b.innerText="Resend Code";b.classList.remove("disabled")}},1000)});
document.getElementById("logoutLink").addEventListener("click",async e=>{e.preventDefault();await signOut(auth);location.href="/login/"});
</script>
<script src="/toast.js"></script>
</body></html>
