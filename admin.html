<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUDOHAGE | Admin Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ea;
--text:#111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Manrope',sans-serif;
color:var(--text);
padding:120px 8% 50px;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
padding:1.2rem 2rem;
background:rgba(246,242,234,.65);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:999;
}

.logo{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2rem;
font-weight:600;
}

.hero{
text-align:center;
margin-bottom:70px;
}

.hero span{
font-size:12px;
letter-spacing:4px;
opacity:.6;
}

.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:5rem;
margin-top:15px;
}

.hero p{
opacity:.7;
margin-top:15px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-bottom:50px;
}

.stat-card{
background:white;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

.stat-card h2{
font-family:'Cormorant Garamond',serif;
font-size:3rem;
}

.stat-card p{
letter-spacing:5px;
font-size:11px;
text-transform:uppercase;
opacity:.6;
margin-bottom:15px;
}

.orders-grid{
display:grid;
gap:25px;
}

.order-card{
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 40px rgba(0,0,0,.05);
}

.order-name{
font-family:'Cormorant Garamond',serif;
font-size:2rem;
margin-bottom:10px;
}

.status{
display:inline-block;
padding:8px 14px;
border-radius:50px;
background:black;
color:white;
font-size:12px;
letter-spacing:2px;
margin-top:15px;
}

.status-btn{
background:#111;
color:white;
border:none;
padding:12px 20px;
border-radius:50px;
cursor:pointer;
margin-top:15px;
letter-spacing:2px;
font-size:12px;
}

.status-btn:hover{
opacity:.8;
}

@media(max-width:768px){

body{
padding:90px 20px 20px;
}

.hero h1{
font-size:2.8rem;
}

}

</style>
</head>

<body>

<header class="header">
<a href="index.html" class="logo">RUDOHAGE</a>
</header>

<section class="hero">
<span>ORDER ARCHIVE</span>
<h1>Collector Archive</h1>
<p>Every RUDOHAGE Piece Has Found Its Owner.</p>
</section>

<div class="stats">

<div class="stat-card">
<p>ARCHIVED COLLECTORS</p>
<h2 id="totalOrders">0</h2>
</div>

</div>

<div class="orders-grid" id="ordersContainer">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "rudohage.firebaseapp.com",
projectId: "rudohage",
storageBucket: "rudohage.firebasestorage.app",
messagingSenderId: "487042116246",
appId: "1:487042116246:web:990d65636addd6d653f0b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ordersContainer =
document.getElementById("ordersContainer");

const totalOrders =
document.getElementById("totalOrders");

async function loadOrders(){

const snapshot =
await getDocs(collection(db,"orders"));

totalOrders.innerText = snapshot.size;

snapshot.forEach((doc)=>{
    const orderId = doc.id;

const order = doc.data();

ordersContainer.innerHTML += `
<div class="order-card">

<div class="order-name">
${order.product}
</div>

<p><b>Collector:</b> ${order.name}</p>

<p><b>Phone:</b> ${order.phone}</p>

<p><b>City:</b> ${order.city}</p>

<p><b>Price:</b> ₹${order.price}</p>

<button
class="status-btn"
onclick="changeStatus('${orderId}','${order.status}')">
${order.status}
</button>

</div>
`;

});

}

window.changeStatus = async function(orderId,currentStatus){

let newStatus = "Pending";

if(currentStatus === "Pending"){
newStatus = "Packed";
}
else if(currentStatus === "Packed"){
newStatus = "Shipped";
}
else if(currentStatus === "Shipped"){
newStatus = "Delivered";
}
else{
newStatus = "Pending";
}

await updateDoc(
doc(db,"orders",orderId),
{
status:newStatus
}
);

location.reload();

}

loadOrders();

</script>

</body>
</html>
