<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">

<title>RUDOHAGE | Admin Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ea;
--text:#111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Manrope',sans-serif;
color:var(--text);
padding:120px 8% 50px;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
padding:1.2rem 2rem;
background:rgba(246,242,234,.65);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:999;
}

.logo{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2rem;
font-weight:600;
}

.hero{
text-align:center;
margin-bottom:70px;
}

.hero span{
font-size:12px;
letter-spacing:4px;
opacity:.6;
}

.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:5rem;
margin-top:15px;
}

.hero p{
opacity:.7;
margin-top:15px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-bottom:50px;
}

.stat-card{
background:white;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

.stat-card h2{
font-family:'Cormorant Garamond',serif;
font-size:3rem;
}

.stat-card p{
letter-spacing:5px;
font-size:11px;
text-transform:uppercase;
opacity:.6;
margin-bottom:15px;
}

.orders-grid{
display:grid;
gap:25px;
}

.order-card{
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 40px rgba(0,0,0,.05);
}

.order-name{
font-family:'Cormorant Garamond',serif;
font-size:2rem;
margin-bottom:10px;
}

.status{
display:inline-block;
padding:8px 14px;
border-radius:50px;
background:black;
color:white;
font-size:12px;
letter-spacing:2px;
margin-top:15px;
}

.status-btn{
background:#111;
color:white;
border:none;
padding:12px 20px;
border-radius:50px;
cursor:pointer;
margin-top:15px;
letter-spacing:2px;
font-size:12px;
}

.status-btn:hover{
opacity:.8;
}

@media(max-width:768px){

body{
padding:90px 20px 20px;
}

.hero h1{
font-size:2.8rem;
}

}

.product-thumb{
width:120px;
height:auto;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

</style>
</head>

<body>

<header class="header">
<a href="index.html" class="logo">RUDOHAGE</a>
</header>

<section class="hero">
<span>ORDER ARCHIVE</span>
<h1>Collector Archive</h1>
<p>Every RUDOHAGE Piece Has Found Its Owner.</p>
</section>

<div class="stats">

    <br>

<input
type="text"
id="searchOrder"
placeholder="Search by Name, Phone or Product"
style="
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
margin-bottom:30px;
font-size:15px;">

<div class="stat-card">
<p>ARCHIVED COLLECTORS</p>
<h2 id="totalOrders">0</h2>
</div>

</div>

<div class="orders-grid" id="ordersContainer">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "rudohage.firebaseapp.com",
projectId: "rudohage",
storageBucket: "rudohage.firebasestorage.app",
messagingSenderId: "487042116246",
appId: "1:487042116246:web:990d65636addd6d653f0b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ordersContainer =
document.getElementById("ordersContainer");

const totalOrders =
document.getElementById("totalOrders");

async function loadOrders(){

const snapshot =
await getDocs(collection(db,"orders"));

totalOrders.innerText = snapshot.size;

snapshot.forEach((doc)=>{
    const orderId = doc.id;

const order = doc.data();

const search =
document.getElementById("searchOrder")
?.value
?.toLowerCase() || "";

let productImage = "";

if(order.product === "Inferno Core"){
productImage = "image/fire-clock-1.png";
}

if(order.product === "Crimson Orbit"){
productImage = "image/fire-clock-2.png";
}

if(order.product === "Ember Crown"){
productImage = "image/fire-clock-3.png";
}

if(
search &&
!order.name.toLowerCase().includes(search) &&
!order.phone.includes(search) &&
!order.product.toLowerCase().includes(search)
){
return;
}


ordersContainer.innerHTML += `
<div class="order-card">

    <img
src="${productImage}"
class="product-thumb">

<div class="order-name">
${order.product}
</div>

<p><b>Collector:</b> ${order.name}</p>

<p><b>Phone:</b> ${order.phone}</p>

<p><b>Address:</b> ${order.address}</p>

<p><b>City:</b> ${order.city}</p>

<p><b>Pincode:</b> ${order.pincode}</p>

<p><b>Price:</b> ₹${order.price}</p>

<p><b>Payment:</b> ${order.payment}</p>

<p><b>Order ID:</b> ${orderId}</p>

<button
class="status-btn"
onclick="changeStatus('${orderId}','${order.status}')">
${order.status}
</button>

<br><br>

<a
href="tel:${order.phone}"
class="status-btn"
style="text-decoration:none;display:inline-block;">
📞 Call Customer
</a>

<a
href="https://wa.me/91${order.phone}"
target="_blank"
class="status-btn"
style="text-decoration:none;display:inline-block;margin-left:10px;">
💬 WhatsApp
</a>

<br><br>

<button
class="status-btn"
onclick="printLabel('${orderId}')">
📦 Print Shipping Label
</button>

</div>
`;

});

}

window.changeStatus = async function(orderId,currentStatus){

let newStatus = "Pending";

if(currentStatus === "Pending"){
newStatus = "Packed";
}
else if(currentStatus === "Packed"){
newStatus = "Shipped";
}
else if(currentStatus === "Shipped"){
newStatus = "Delivered";
}
else{
newStatus = "Pending";
}

await updateDoc(
doc(db,"orders",orderId),
{
status:newStatus
}
);

location.reload();

}

window.printLabel = async function(orderId){

const snapshot = await getDocs(collection(db,"orders"));

snapshot.forEach((d)=>{

if(d.id === orderId){

const order = d.data();

const label = window.open("", "_blank");

label.document.write(`

<html>

<head>

<title>RUDOHAGE Premium Shipping Label</title>

<style>
body{
background:#f6f2ea;
padding:15px;      
font-family:'Manrope',sans-serif;
}

.label{
max-width:800px;   
margin:auto;
background:white;
padding:25px;     
border:3px solid #111;
border-radius:15px;
}

.brand{
text-align:center;
margin-bottom:20px; 
}

.brand h1{
font-family:'Cormorant Garamond',serif;
font-size:38px;     
margin:0;
letter-spacing:3px;
}

.brand p{
margin-top:4px;
letter-spacing:2px;
opacity:.6;
font-size:11px;
}

.row{
display:flex;
justify-content:space-between;
margin:6px 0;       
font-size:13px;    
}

.address{
margin-top:15px;
padding:12px;       
border:2px dashed #111;
border-radius:10px;
line-height:1.4;
font-size:13px;
}

.badge{
margin-top:12px;
padding:10px;        
font-size:12px;
}

.fragile{
margin-top:10px;
padding:10px;        
font-size:12px;
}

.footer{
margin-top:15px;     \
text-align:center;
font-size:11px;
opacity:.7;
}

hr{
margin:12px 0;      
}

</style>

</head>

<body>

<div class="label">

<div class="brand">

<h1>RUDOHAGE</h1>

<p>HANDCRAFTED LUXURY HOROLOGY</p>

</div>

<div class="row">
<span><b>Invoice Number</b></span>
<span>INV-${orderId.slice(-6)}</span>
</div>

<div class="row">
<span><b>Order Number</b></span>
<span>${orderId}</span>
</div>

<div class="row">
<span><b>Order Date</b></span>
<span>${new Date().toLocaleDateString()}</span>
</div>

<div class="row">
<span><b>Order Status</b></span>
<span>${order.status || "Pending"}</span>
</div>

<hr>

<h2>Customer Details</h2>

<div class="row">
<span>Name</span>
<span>${order.name}</span>
</div>

<div class="row">
<span>Phone</span>
<span>${order.phone}</span>
</div>

<div class="row">
<span>City</span>
<span>${order.city}</span>
</div>

<div class="row">
<span>Pincode</span>
<span>${order.pincode}</span>
</div>

<div class="address">

<b>SHIPPING ADDRESS</b>

<br><br>

${order.name}

<br>

${order.address}

<br>

${order.city}

<br>

${order.pincode}

<br>

${order.phone}

</div>

<hr>

<h2>Order Details</h2>

<div class="row">
<span>Product</span>
<span>${order.product}</span>
</div>

<div class="row">
<span>Payment Method</span>
<span>${order.payment}</span>
</div>

<div class="row">
<span>Amount</span>
<span>₹${order.price}</span>
</div>

<div class="badge">

HANDCRAFTED PIECE

</div>

<div class="fragile">

FRAGILE • HANDLE WITH CARE

</div>

<div class="footer">

RUDOHAGE® Luxury Horology Collection

</div>

</div>

</body>

</html>

`);

label.document.close();

setTimeout(()=>{
label.print();
},500);

}

});

}

loadOrders();

document
.getElementById("searchOrder")
.addEventListener("input", ()=>{

ordersContainer.innerHTML = "";

loadOrders();

});


</script>

    <script>
document.addEventListener('contextmenu', event => event.preventDefault());

document.onkeydown = function(e) {
    if (
        e.keyCode == 123 ||
        (e.ctrlKey && e.shiftKey && e.keyCode == 73) ||
        (e.ctrlKey && e.shiftKey && e.keyCode == 74) ||
        (e.ctrlKey && e.keyCode == 85)
    ) {
        return false;
    }
};
</script>

</body>
</html>
