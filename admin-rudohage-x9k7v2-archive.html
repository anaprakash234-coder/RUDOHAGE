<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo.png">

<title>RUDOHAGE | Admin Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ea;
--text:#111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Manrope',sans-serif;
color:var(--text);
padding:120px 8% 50px;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
padding:1.2rem 2rem;
background:rgba(246,242,234,.65);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2rem;
font-weight:600;
}

.logout-btn{
padding:8px 18px;
border:1px solid rgba(0,0,0,.15);
border-radius:50px;
background:transparent;
font-size:.75rem;
letter-spacing:2px;
cursor:pointer;
}

.logout-btn:hover{
background:#111;
color:white;
}

/* ===== LOGIN SCREEN ===== */
.login-screen{
position:fixed;
inset:0;
background:var(--bg);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.login-box{
background:white;
padding:50px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
width:100%;
max-width:420px;
text-align:center;
}

.login-box h1{
font-family:'Cormorant Garamond',serif;
font-size:2.5rem;
margin-bottom:8px;
}

.login-box p{
opacity:.6;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:30px;
}

.login-box input{
width:100%;
padding:16px;
margin-bottom:14px;
border:none;
background:#f7f7f7;
border-radius:14px;
font-size:15px;
}

.login-box button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#111;
color:white;
font-size:13px;
letter-spacing:3px;
cursor:pointer;
}

/* ===== SESSION CHECK ===== */
.session-check{
position:fixed;
inset:0;
background:var(--bg);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9998;
gap:18px;
}

.session-check .loader{
width:46px;
height:46px;
border:3px solid #ddd;
border-top:3px solid #111;
border-radius:50%;
animation:spin 1s linear infinite;
}

.session-check span{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
opacity:.55;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ===== ADMIN CONTENT ===== */
#adminContent{
display:none;
}

.hero{
text-align:center;
margin-bottom:70px;
}

.hero span{
font-size:12px;
letter-spacing:4px;
opacity:.6;
}

.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:5rem;
margin-top:15px;
}

.hero p{
opacity:.7;
margin-top:15px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-bottom:50px;
}

.stat-card{
background:white;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

.stat-card h2{
font-family:'Cormorant Garamond',serif;
font-size:3rem;
}

.stat-card p{
letter-spacing:5px;
font-size:11px;
text-transform:uppercase;
opacity:.6;
margin-bottom:15px;
}

.orders-grid{
display:grid;
gap:25px;
}

.order-card{
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 40px rgba(0,0,0,.05);
}

.order-name{
font-family:'Cormorant Garamond',serif;
font-size:2rem;
margin-bottom:10px;
}

.status-btn{
background:#111;
color:white;
border:none;
padding:12px 20px;
border-radius:50px;
cursor:pointer;
margin-top:15px;
letter-spacing:2px;
font-size:12px;
}

.status-btn:hover{
opacity:.8;
}

@media(max-width:768px){
body{
padding:90px 20px 20px;
}
.hero h1{
font-size:2.8rem;
}
.login-box{
padding:30px;
}
}

.product-thumb{
width:120px;
height:auto;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

</style>
</head>

<body>

<!-- SESSION CHECK -->
<div class="session-check" id="sessionCheck">
  <div class="loader"></div>
  <span>Verifying Admin Access...</span>
</div>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen" style="display:none;">
  <div class="login-box">
    <h1>RUDOHAGE</h1>
    <p>Admin Access Only</p>
    <input type="email" id="adminEmail" placeholder="Admin Email">
    <input type="password" id="adminPassword" placeholder="Password" style="margin-top:0;">
    <button id="adminLoginBtn">LOGIN</button>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <a href="/" class="logo">RUDOHAGE</a>
  <button class="logout-btn" id="logoutBtn" style="display:none;">LOGOUT</button>
</header>

<!-- ADMIN CONTENT -->
<div id="adminContent">

<section class="hero">
<span>ORDER ARCHIVE</span>
<h1>Collector Archive</h1>
<p>Every RUDOHAGE Piece Has Found Its Owner.</p>
</section>

<div class="stats">

<br>

<input
type="text"
id="searchOrder"
placeholder="Search by Name, Phone or Product"
style="
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
margin-bottom:30px;
font-size:15px;">

<div class="stat-card">
<p>ARCHIVED COLLECTORS</p>
<h2 id="totalOrders">0</h2>
</div>

</div>

<div class="orders-grid" id="ordersContainer"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "rudohage.firebaseapp.com",
projectId: "rudohage",
storageBucket: "rudohage.firebasestorage.app",
messagingSenderId: "487042116246",
appId: "1:487042116246:web:990d65636addd6d653f0b7"
};

const ADMIN_EMAIL = "anaprakash234@gmail.com";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const sessionCheck = document.getElementById("sessionCheck");
const loginScreen = document.getElementById("loginScreen");
const adminContent = document.getElementById("adminContent");
const logoutBtn = document.getElementById("logoutBtn");

// ===== AUTH STATE =====
onAuthStateChanged(auth, (user) => {

  sessionCheck.style.display = "none";

  if(user && user.email === ADMIN_EMAIL){
    loginScreen.style.display = "none";
    adminContent.style.display = "block";
    logoutBtn.style.display = "block";
    loadOrders();
  } else {
    if(user){
      signOut(auth);
    }
    loginScreen.style.display = "flex";
    adminContent.style.display = "none";
    logoutBtn.style.display = "none";
  }

});

// ===== LOGIN =====
document.getElementById("adminLoginBtn").addEventListener("click", async () => {

  const email = document.getElementById("adminEmail").value.trim();
  const password = document.getElementById("adminPassword").value;

  if(!email || !password){
    alert("Please fill both fields");
    return;
  }

  try{
    const cred = await signInWithEmailAndPassword(auth, email, password);

    if(cred.user.email !== ADMIN_EMAIL){
      await signOut(auth);
      alert("Access denied. Admin only.");
    }

  }catch(err){
    alert("Login failed: " + err.message);
  }

});

// ===== LOGOUT =====
logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
});

// ===== LOAD ORDERS =====
async function loadOrders(){

  const ordersContainer = document.getElementById("ordersContainer");
  const totalOrders = document.getElementById("totalOrders");

  ordersContainer.innerHTML = "";

  const snapshot = await getDocs(collection(db,"orders"));
  const search = document.getElementById("searchOrder")?.value?.toLowerCase() || "";

  totalOrders.innerText = snapshot.size;

  snapshot.forEach((d) => {

    const orderId = d.id;
    const order = d.data();

    if(
      search &&
      !(order.name || "").toLowerCase().includes(search) &&
      !(order.phone || "").includes(search) &&
      !(order.product || "").toLowerCase().includes(search)
    ){
      return;
    }

    let productImage = "";
    if(order.product === "Inferno Core") productImage = "image/fire-clock-1.png";
    if(order.product === "Crimson Orbit") productImage = "image/fire-clock-2.png";
    if(order.product === "Ember Crown") productImage = "image/fire-clock-3.png";

    ordersContainer.innerHTML += `
      <div class="order-card">

        <img src="${productImage}" class="product-thumb">

        <div class="order-name">${order.product || ""}</div>

        <p><b>Collector:</b> ${order.name || ""}</p>
        <p><b>Phone:</b> ${order.phone || ""}</p>
        <p><b>Address:</b> ${order.address || ""}</p>
        <p><b>City:</b> ${order.city || ""}</p>
        <p><b>Pincode:</b> ${order.pincode || ""}</p>
        <p><b>Price:</b> ₹${order.price || ""}</p>
        <p><b>Payment:</b> ${order.payment || ""}</p>
        <p><b>Order ID:</b> ${orderId}</p>

        <button
          class="status-btn"
          onclick="changeStatus('${orderId}','${order.status}')">
          ${order.status || "Pending"}
        </button>

        <br><br>

        <a
          href="tel:${order.phone}"
          class="status-btn"
          style="text-decoration:none;display:inline-block;">
          📞 Call Customer
        </a>

        <a
          href="https://wa.me/91${order.phone}"
          target="_blank"
          class="status-btn"
          style="text-decoration:none;display:inline-block;margin-left:10px;">
          💬 WhatsApp
        </a>

        <br><br>

        <button
          class="status-btn"
          onclick="printLabel('${orderId}')">
          📦 Print Shipping Label
        </button>

      </div>`;

  });

}

// ===== CHANGE STATUS =====
window.changeStatus = async function(orderId, currentStatus){

  const statusFlow = {
    "Paid": "Packed",
    "COD Pending Approval": "Packed",
    "Packed": "Shipped",
    "Shipped": "Delivered",
    "Delivered": "Paid",
    "Pending": "Packed"
  };

  const newStatus = statusFlow[currentStatus] || "Packed";

  try{
    await updateDoc(doc(db,"orders",orderId), { status: newStatus });
    loadOrders();
  }catch(err){
    alert("Update failed: " + err.message);
    console.error(err);
  }

};

// ===== PRINT LABEL =====
window.printLabel = async function(orderId){

  const snapshot = await getDocs(collection(db,"orders"));

  snapshot.forEach((d) => {

    if(d.id !== orderId) return;

    const order = d.data();
    const label = window.open("", "_blank");

    label.document.write(`
      <html>
      <head>
      <title>RUDOHAGE Shipping Label</title>
      <style>
      body{background:#f6f2ea;padding:15px;font-family:'Manrope',sans-serif;}
      .label{max-width:800px;margin:auto;background:white;padding:25px;border:3px solid #111;border-radius:15px;}
      .brand{text-align:center;margin-bottom:20px;}
      .brand h1{font-family:'Cormorant Garamond',serif;font-size:38px;margin:0;letter-spacing:3px;}
      .brand p{margin-top:4px;letter-spacing:2px;opacity:.6;font-size:11px;}
      .row{display:flex;justify-content:space-between;margin:6px 0;font-size:13px;}
      .address{margin-top:15px;padding:12px;border:2px dashed #111;border-radius:10px;line-height:1.4;font-size:13px;}
      .footer{margin-top:15px;text-align:center;font-size:11px;opacity:.7;}
      hr{margin:12px 0;}
      </style>
      </head>
      <body>
      <div class="label">
        <div class="brand">
          <h1>RUDOHAGE</h1>
          <p>HANDCRAFTED LUXURY HOROLOGY</p>
        </div>
        <div class="row"><span><b>Invoice</b></span><span>INV-${orderId.slice(-6)}</span></div>
        <div class="row"><span><b>Order ID</b></span><span>${orderId}</span></div>
        <div class="row"><span><b>Date</b></span><span>${new Date().toLocaleDateString()}</span></div>
        <div class="row"><span><b>Status</b></span><span>${order.status || "Pending"}</span></div>
        <hr>
        <h2>Customer Details</h2>
        <div class="row"><span>Name</span><span>${order.name}</span></div>
        <div class="row"><span>Phone</span><span>${order.phone}</span></div>
        <div class="row"><span>City</span><span>${order.city}</span></div>
        <div class="row"><span>Pincode</span><span>${order.pincode}</span></div>
        <div class="address">
          <b>SHIPPING ADDRESS</b><br><br>
          ${order.name}<br>${order.address}<br>${order.city}<br>${order.pincode}<br>${order.phone}
        </div>
        <hr>
        <h2>Order Details</h2>
        <div class="row"><span>Product</span><span>${order.product}</span></div>
        <div class="row"><span>Payment</span><span>${order.payment}</span></div>
        <div class="row"><span>Amount</span><span>₹${order.price}</span></div>
        <div class="footer">RUDOHAGE® Luxury Horology Collection • FRAGILE • HANDLE WITH CARE</div>
      </div>
      </body>
      </html>
    `);

    label.document.close();
    setTimeout(() => label.print(), 500);

  });

};

// ===== SEARCH =====
document.getElementById("searchOrder").addEventListener("input", () => {
  loadOrders();
});

</script>

<script>
document.addEventListener('contextmenu', event => event.preventDefault());
document.onkeydown = function(e) {
    if (
        e.keyCode == 123 ||
        (e.ctrlKey && e.shiftKey && e.keyCode == 73) ||
        (e.ctrlKey && e.shiftKey && e.keyCode == 74) ||
        (e.ctrlKey && e.keyCode == 85)
    ) {
        return false;
    }
};
</script>

</body>
</html>
