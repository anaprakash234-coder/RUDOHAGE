<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="/logo.png"><title>Sign Up | RUDOHAGE</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6f2ea;font-family:'Manrope',sans-serif;color:#111;line-height:1.5;min-height:100vh;position:relative;overflow:hidden}.glow{position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(164,139,116,.15),transparent 70%);pointer-events:none;z-index:0}.glow2{position:fixed;bottom:-150px;left:-150px;width:400px;height:400px;background:radial-gradient(circle,rgba(0,0,0,.06),transparent 70%);pointer-events:none;z-index:0}.hdr{position:fixed;top:0;left:0;width:100%;z-index:999;padding:12px 28px;background:rgba(246,242,234,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.04);display:flex;justify-content:space-between;align-items:center}.brand{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;text-decoration:none;color:#111;letter-spacing:-.5px}.back{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;color:rgba(0,0,0,.45);transition:.3s}.back:hover{color:#111}.wrap{position:relative;z-index:1;display:grid;grid-template-columns:1.1fr .9fr;gap:50px;max-width:850px;width:100%;margin:90px auto 0;padding:0 20px;align-items:center}.hero .badge{display:inline-block;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#a48b74;margin-bottom:12px;padding:4px 12px;border:1px solid rgba(164,139,116,.25);border-radius:50px}.hero h1{font-family:'Cormorant Garamond',serif;font-size:3.2rem;line-height:.95;margin-bottom:10px;font-style:italic;letter-spacing:-1px}.hero h1 span{font-style:normal;font-weight:300;display:block;font-size:1.8rem;opacity:.4;letter-spacing:0}.hero p{font-size:.75rem;opacity:.45;max-width:300px;line-height:1.7}.card{background:#fff;border-radius:18px;padding:26px 24px;box-shadow:0 8px 40px rgba(0,0,0,.06);position:relative;overflow:hidden}.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#a48b74,transparent)}.card h2{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;margin-bottom:14px;letter-spacing:-.5px}.card label{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;opacity:.4;display:block;margin-bottom:3px}.card input{width:100%;padding:10px 13px;margin-bottom:10px;border:none;background:#f5f3ef;border-radius:10px;font-size:.75rem;font-family:'Manrope',sans-serif;outline:none;transition:.3s}.card input:focus{background:#eeeae3;box-shadow:0 0 0 3px rgba(164,139,116,.1)}.btn,.gbtn{width:100%;padding:11px;border:none;border-radius:50px;cursor:pointer;font-size:.72rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:'Manrope',sans-serif;transition:.3s;display:flex;align-items:center;justify-content:center;gap:7px}.btn{background:#111;color:#fff;margin-top:4px}.btn:hover{background:#a48b74;transform:translateY(-2px);box-shadow:0 8px 24px rgba(164,139,116,.25)}.gbtn{background:#fff;color:#111;border:1px solid rgba(0,0,0,.1);margin-top:8px}.gbtn:hover{background:#f9f9f9;transform:translateY(-2px)}.gbtn i{font-size:14px}.divider{display:flex;align-items:center;gap:10px;margin:12px 0;font-size:.6rem;opacity:.3;letter-spacing:1px;text-transform:uppercase}.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(0,0,0,.1)}.links{text-align:center;margin-top:12px;font-size:.62rem}.links a{text-decoration:none;color:#111;opacity:.45;transition:.3s}.links a:hover{opacity:1;color:#a48b74}.loader-overlay{position:fixed;inset:0;background:rgba(246,242,234,.95);backdrop-filter:blur(10px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:14px}.loader-overlay .ld{width:40px;height:40px;border:3px solid #ddd;border-top:3px solid #111;border-radius:50%;animation:sp .7s linear infinite}.loader-overlay span{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;opacity:.5}@keyframes sp{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.btn-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;display:inline-block;animation:sp .6s linear infinite}.gbtn .btn-spin{border:2px solid rgba(0,0,0,.15);border-top:2px solid #111}@media(max-width:650px){body{overflow-y:auto;overflow-x:hidden}.wrap{grid-template-columns:1fr;gap:22px;margin-top:70px}.hero{text-align:center}.hero h1{font-size:2.4rem}.hero h1 span{font-size:1.3rem}.hero p{max-width:100%;margin:0 auto}.card{padding:20px 16px}}</style></head><body>
<div class="glow"></div><div class="glow2"></div><div class="loader-overlay" id="loader"><div class="ld"></div><span>Creating Account...</span></div>
<header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back">← Back</a></header>
<div class="wrap"><div class="hero"><div class="badge">Collector Registration</div><h1>Create Your<span>Archive</span></h1><p>Begin your journey with RUDOHAGE. Track orders, manage acquisitions and access future releases.</p></div><div class="card"><h2>Create Account</h2><label>Email</label><input type="email" id="email" placeholder="collector@email.com"><label>Password</label><input type="password" id="password" placeholder="········"><label>Confirm Password</label><input type="password" id="confirmPassword" placeholder="········"><button class="btn" id="signupBtn"><i class="fas fa-user-plus"></i> Create Account</button><div class="divider">or sign up with</div><button class="gbtn" id="googleBtn"><i class="fa-brands fa-google"></i> Google</button><div class="links"><a href="/login/">Already have an account? Login</a></div></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getAuth,createUserWithEmailAndPassword,GoogleAuthProvider,signInWithPopup}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";import{getFirestore,doc,getDoc,setDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
const fc={apiKey:"AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",authDomain:"rudohage.firebaseapp.com",projectId:"rudohage",storageBucket:"rudohage.firebasestorage.app",messagingSenderId:"487042116246",appId:"1:487042116246:web:990d65636addd6d653f0b7"},app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app),params=new URLSearchParams(location.search),redir=params.get("redirect"),API="https://razorpay-backend-6yg5.onrender.com";
function goVerify(){let u="/verify-email/";if(redir)u+="?redirect="+encodeURIComponent(redir);location.href=u}
async function sendOtp(e){try{await fetch(API+"/send-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:e})})}catch(err){}}
function btnLoad(b,l){if(l){b.dataset.html=b.innerHTML;b.innerHTML='<span class="btn-spin"></span>';b.disabled=true}else{b.innerHTML=b.dataset.html;b.disabled=false}}
document.getElementById("signupBtn").addEventListener("click",async()=>{const e=document.getElementById("email").value.trim(),p=document.getElementById("password").value,c=document.getElementById("confirmPassword").value;if(!e||!p){alert("Fill all fields");return}if(p!==c){alert("Passwords don't match");return}const b=document.getElementById("signupBtn");btnLoad(b,true);try{const u=await createUserWithEmailAndPassword(auth,e,p);document.getElementById("loader").style.display="flex";await setDoc(doc(db,"users",u.user.uid),{email:u.user.email,emailVerified:false,createdAt:serverTimestamp()});await sendOtp(u.user.email);goVerify()}catch(err){btnLoad(b,false);document.getElementById("loader").style.display="none";alert(err.message)}});
document.getElementById("googleBtn").addEventListener("click",async()=>{const b=document.getElementById("googleBtn");btnLoad(b,true);try{const r=await signInWithPopup(auth,new GoogleAuthProvider());document.getElementById("loader").style.display="flex";const ref=doc(db,"users",r.user.uid),snap=await getDoc(ref);if(!snap.exists()){await setDoc(ref,{email:r.user.email,emailVerified:false,createdAt:serverTimestamp()});await sendOtp(r.user.email);goVerify()}else{const d=snap.data();if(d&&d.emailVerified===true){location.href=redir?decodeURIComponent(redir):"/myaccount/"}else{goVerify()}}}catch(err){btnLoad(b,false);document.getElementById("loader").style.display="none";alert(err.message)}});
</script>
<script src="/toast.js"></script>
<script>document.addEventListener('contextmenu',e=>e.preventDefault());document.onkeydown=function(e){if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74))||(e.ctrlKey&&e.keyCode==85))return false}</script>
</body></html>
