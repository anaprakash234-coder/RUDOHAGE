<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUDOHAGE Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#f6f2ea;
font-family:'Manrope',sans-serif;
padding:40px;
max-width:800px;
margin:auto;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:3rem;
margin-bottom:30px;
}

.form-box{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

input,
textarea,
select{
width:100%;
padding:15px;
margin-bottom:20px;
border:none;
background:#f4f4f4;
border-radius:12px;
font-size:15px;
}

button{
background:black;
color:white;
padding:15px 30px;
border:none;
border-radius:50px;
cursor:pointer;
font-size:15px;
width:100%;
}

.product-info{
background:#f4f4f4;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

</style>
</head>

<body>

<h1>Checkout</h1>

<div class="form-box">

<div class="product-info">

<p><b>Product:</b> <span id="productName"></span></p>

<p><b>Price:</b> ₹<span id="productPrice"></span></p>

</div>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Full Address"></textarea>

<input type="text" id="city" placeholder="City">

<input type="text" id="pincode" placeholder="Pincode">

<select id="paymentMethod">

<option>Cash On Delivery</option>

</select>

<button id="placeOrder">

Place Order

</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("productName").innerText =
params.get("product");

document.getElementById("productPrice").innerText =
params.get("price");

</script>

</body>
</html>
```
