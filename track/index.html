<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" type="image/png" href="/logo.png"><title>RUDOHAGE | Track Order</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/></head>
<body><header class="product-header"><a href="index.html" class="product-brand">RUDOHAGE</a></header><div class="small">ORDER TRACKING</div><h1>Track Your Piece</h1><div class="track-box"><div class="result" id="result"></div><a href="index.html" class="back-home-btn">← Back to Home</a></div>
<style>body{background:#f6f2ea;font-family:'Manrope',sans-serif;padding:120px 8%;color:#111;text-align:center}.small{letter-spacing:4px;font-size:12px;opacity:.6;margin-bottom:20px}h1{font-family:'Cormorant Garamond',serif;font-size:5rem;margin-bottom:20px}.track-box{max-width:700px;margin:auto;background:rgba(255,255,255,.75);padding:50px;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,.08);backdrop-filter:blur(12px);border:1px solid rgba(0,0,0,.06)}input{width:100%;padding:18px;border:none;background:#f4f4f4;border-radius:14px;margin:20px 0;font-size:16px}button{padding:18px 35px;border:none;background:#111;color:#fff;border-radius:50px;cursor:pointer}.result h2{font-family:'Cormorant Garamond',serif;font-size:2.5rem;margin-bottom:10px}.result p{font-size:15px;opacity:.7;margin:8px 0}.status{display:inline-block;margin-top:15px;padding:12px 22px;background:#111;color:#fff;border-radius:50px;letter-spacing:2px;font-size:12px}.product-header{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:1.3rem 4rem;background:rgba(246,242,234,.55);backdrop-filter:blur(18px);border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center}.product-brand{text-decoration:none;color:#111;font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:600;letter-spacing:-1px}.back-home-btn{display:inline-block;margin-top:30px;padding:14px 28px;border-radius:30px;background:#111;color:#fff;text-decoration:none;font-size:14px;letter-spacing:2px;transition:.3s}.back-home-btn:hover{background:transparent;color:#111;border:1px solid #111;transform:translateY(-2px)}.order-id-box{margin-top:20px;display:flex;justify-content:center;gap:10px;align-items:center}.order-id-box span{background:#f4f4f4;padding:10px 15px;border-radius:10px;font-size:12px}.order-id-box button{padding:10px 15px;border:none;border-radius:10px;background:#111;color:#fff}.progress{margin-top:25px;display:flex;justify-content:space-between}.step{flex:1;margin:5px;padding:10px;background:#eee;border-radius:20px;font-size:12px}.step.active{background:#111;color:#fff}.timeline{margin-top:25px;text-align:left;background:#fafafa;padding:20px;border-radius:15px}.whatsapp-btn{display:inline-block;margin-top:20px;padding:14px 20px;background:#25D366;color:#fff;text-decoration:none;border-radius:30px}@media(max-width:768px){h1{font-size:2.8rem}body{padding:90px 20px}.product-header{justify-content:center;padding:10px 0;text-align:center}.product-brand{font-size:1.3rem;width:100%;text-align:center}}</style>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",authDomain:"rudohage.firebaseapp.com",projectId:"rudohage",storageBucket:"rudohage.firebasestorage.app",messagingSenderId:"487042116246",appId:"1:487042116246:web:990d65636addd6d653f0b7"};
const app=initializeApp(firebaseConfig),db=getFirestore(app);
window.addEventListener("load",async()=>{const e=new URLSearchParams(window.location.search).get("orderId");if(!e){alert("Enter Order ID");return}const t=await getDoc(doc(db,"orders",e));
if(t.exists()){const r=t.data();document.getElementById("result").innerHTML=`<h2>${r.product}</h2><p>Collector : ${r.name}</p><p>City : ${r.city}</p><div class="status">${r.status}</div><div class="order-id-box"><span>${e}</span><button onclick="copyOrderId('${e}')">Copy ID</button></div><div class="progress"><div class="step ${"Pending"!==r.status?"active":""}">Placed</div><div class="step ${"Shipped"===r.status||"Delivered"===r.status?"active":""}">Shipped</div><div class="step ${"Delivered"===r.status?"active":""}">Delivered</div></div><div class="timeline"><div>✔ Order Placed</div><div>${"Pending"!==r.status?"✔ Processing":"⏳ Waiting"}</div><div>${"Delivered"===r.status?"✔ Delivered":"⏳ In Transit"}</div></div><a class="whatsapp-btn" href="https://wa.me/917091955862?text=My Order ID: ${e}" target="_blank">💬 WhatsApp Support</a>`}
else document.getElementById("result").innerHTML='<h2 style="font-size:2rem;font-family:\'Cormorant Garamond\'">Order Not Found</h2><p style="opacity:0.6">Please check your Order ID again</p>'});</script>
<script>function copyOrderId(e){navigator.clipboard.writeText(e);alert("Order ID Copied!")}document.addEventListener("contextmenu",e=>e.preventDefault());
document.onkeydown=function(e){if(123==e.keyCode||e.ctrlKey&&e.shiftKey&&(73==e.keyCode||74==e.keyCode)||e.ctrlKey&&85==e.keyCode)return!1};</script>
</body></html>
