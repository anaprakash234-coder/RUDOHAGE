<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png">

<title>RUDOHAGE | Client Impressions</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ea;
--text:#111;
--accent:#a48b74;
--radius:22px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Manrope',sans-serif;
padding:80px 10%;
color:var(--text);
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:4rem;
text-align:center;
margin-bottom:10px;
}

.sub{
text-align:center;
opacity:.7;
margin-bottom:60px;
}

.review-card{
background:rgba(255,255,255,.7);
backdrop-filter:blur(12px);
padding:25px;
border-radius:22px;
margin-bottom:20px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
}

.review-card h3{
margin-bottom:10px;
}

.stars{
font-size:20px;
margin-bottom:10px;
}

.form-box{
margin-top:60px;
background:white;
padding:30px;
border-radius:22px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
}

input,
textarea,
select{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:20px;
border:none;
background:#f3f3f3;
border-radius:12px;
font-size:15px;
}

button{
padding:15px 30px;
border:none;
border-radius:50px;
background:black;
color:white;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>
</head>

<body>

<h1>Client Impressions</h1>

<p class="sub">
Thoughts from collectors and admirers of RUDOHAGE.
</p>

<div class="form-box">

<h2>Share Your Experience</h2>

<input
type="text"
id="reviewName"
placeholder="Your Name">

<select id="reviewRating">
<option value="5">★★★★★</option>
<option value="4">★★★★</option>
<option value="3">★★★</option>
<option value="2">★★</option>
<option value="1">★</option>
</select>

<textarea
id="reviewText"
rows="5"
placeholder="Write your review">
</textarea>

<button id="publishBtn">
Publish Review
</button>

</div>

<h2 style="margin-top:60px;margin-bottom:25px;text-align:center;">
Latest Reviews
</h2>

<div id="reviewsContainer"></div>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
limit
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
  authDomain: "rudohage.firebaseapp.com",
  projectId: "rudohage",
  storageBucket: "rudohage.firebasestorage.app",
  messagingSenderId: "487042116246",
  appId: "1:487042116246:web:990d65636addd6d653f0b7",
  measurementId: "G-6GLB5PPXMY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadReviews() {

const container =
document.getElementById("reviewsContainer");

container.innerHTML = "";

const q = query(
collection(db,"reviews"),
orderBy("date","desc"),
limit(20)
);

const snapshot = await getDocs(q);

snapshot.forEach((doc)=>{

const data = doc.data();

container.innerHTML += `
<div class="review-card">

<h3>${data.name}</h3>

<div class="stars">
${"★".repeat(data.rating)}
</div>

<p>${data.review}</p>

</div>
`;

});

}

document
.getElementById("publishBtn")
.addEventListener("click", async ()=>{

const name =
document.getElementById("reviewName").value;

const review =
document.getElementById("reviewText").value;

const rating =
parseInt(
document.getElementById("reviewRating").value
);

if(!name || !review){

alert("Please fill all fields");

return;

}

await addDoc(
collection(db,"reviews"),
{
name,
review,
rating,
date:Date.now()
}
);

document.getElementById("reviewName").value="";
document.getElementById("reviewText").value="";

loadReviews();

});

loadReviews();

</script>

  <script>
document.addEventListener('contextmenu', event => event.preventDefault());

document.onkeydown = function(e) {
    if (
        e.keyCode == 123 ||
        (e.ctrlKey && e.shiftKey && e.keyCode == 73) ||
        (e.ctrlKey && e.shiftKey && e.keyCode == 74) ||
        (e.ctrlKey && e.keyCode == 85)
    ) {
        return false;
    }
};
</script>

</body>
</html>
