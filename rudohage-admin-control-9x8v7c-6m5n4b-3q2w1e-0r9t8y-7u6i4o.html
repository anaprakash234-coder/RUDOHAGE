<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUDOHAGE · Control Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#f6f2ea;font-family:'Manrope',sans-serif;color:#111;padding:20px;min-height:100vh}
    body.dark{background:#1a1816;color:#e8ddd0}
    .wrap{max-width:1000px;margin:0 auto}
    .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;padding:16px 0 20px;border-bottom:1px solid rgba(0,0,0,.06)}
    .header h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;letter-spacing:-1px}
    .header h1 small{font-size:.6rem;opacity:.3;font-family:'Manrope',sans-serif;letter-spacing:2px;margin-left:8px;font-weight:400}
    .header-actions{display:flex;gap:8px;flex-wrap:wrap}
    .header-actions button{padding:8px 16px;border:none;border-radius:50px;background:#111;color:#fff;font-size:.6rem;font-weight:600;cursor:pointer;transition:.3s;font-family:'Manrope',sans-serif}
    .header-actions button:hover{background:#a48b74;transform:translateY(-2px)}
    .header-actions button.outline{background:transparent;border:1px solid rgba(0,0,0,.1);color:#111}
    body.dark .header-actions button.outline{color:#e8ddd0;border-color:rgba(255,255,255,.1)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
    .card{background:#fff;border-radius:16px;padding:20px 22px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
    body.dark .card{background:#2a2622}
    .card h3{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .card h3 i{color:#a48b74;font-size:14px}
    .card label{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;opacity:.4;display:block;margin-bottom:4px}
    .card input,.card textarea,.card select{width:100%;padding:10px 12px;border:none;background:#f5f3ef;border-radius:10px;font-size:.8rem;font-family:'Manrope',sans-serif;outline:none;margin-bottom:10px}
    body.dark .card input,body.dark .card textarea,body.dark .card select{background:#1a1816;color:#e8ddd0}
    .card textarea{resize:vertical;min-height:80px}
    .card .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{padding:10px 20px;border:none;border-radius:50px;background:#111;color:#fff;font-size:.65rem;font-weight:600;cursor:pointer;transition:.3s;font-family:'Manrope',sans-serif}
    .btn:hover{background:#a48b74;transform:translateY(-2px)}
    .btn-danger{background:#d32f2f;color:#fff}
    .btn-danger:hover{background:#b71c1c}
    .btn-outline{background:transparent;border:1px solid rgba(0,0,0,.1);color:#111}
    body.dark .btn-outline{color:#e8ddd0;border-color:rgba(255,255,255,.1)}
    .toggle-wrap{display:flex;align-items:center;gap:12px;margin:8px 0}
    .toggle{width:44px;height:24px;background:#ddd;border-radius:50px;cursor:pointer;position:relative;transition:.3s;flex-shrink:0}
    .toggle.on{background:#a48b74}
    .toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 2px 4px rgba(0,0,0,.15)}
    .toggle.on::after{left:22px}
    .toggle-label{font-size:.7rem;font-weight:500}
    .toggle-status{font-size:.6rem;opacity:.4;margin-left:4px}
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:8px}
    .product-card{background:#f8f6f2;padding:12px;border-radius:12px;text-align:center}
    body.dark .product-card{background:#1a1816}
    .product-card img{width:70px;height:70px;object-fit:cover;border-radius:8px;margin-bottom:6px}
    .product-card .pname{font-weight:600;font-size:.75rem}
    .product-card .pprice{font-size:.65rem;opacity:.5}
    .product-card .pactions{display:flex;gap:4px;justify-content:center;margin-top:6px}
    .product-card .pactions button{padding:4px 10px;border:none;border-radius:50px;font-size:.5rem;font-weight:600;cursor:pointer;transition:.3s;font-family:'Manrope',sans-serif}
    .product-card .pactions .edit{background:#111;color:#fff}
    .product-card .pactions .edit:hover{background:#a48b74}
    .product-card .pactions .del{background:#d32f2f;color:#fff}
    .product-card .pactions .del:hover{background:#b71c1c}
    .color-picker{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
    .color-picker input[type="color"]{width:40px;height:40px;border:none;border-radius:50%;cursor:pointer;padding:0;background:transparent}
    .color-picker input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
    .color-picker input[type="color"]::-webkit-color-swatch{border:none;border-radius:50%}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;opacity:0;transition:.4s;z-index:9999;pointer-events:none}
    .toast.show{opacity:1}
    .login-overlay{position:fixed;inset:0;background:#f6f2ea;display:flex;align-items:center;justify-content:center;z-index:99999;padding:20px}
    body.dark .login-overlay{background:#1a1816}
    .login-box{background:#fff;padding:40px 32px;border-radius:24px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    body.dark .login-box{background:#2a2622}
    .login-box h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;text-align:center;margin-bottom:4px}
    .login-box .sub{text-align:center;font-size:.65rem;opacity:.4;margin-bottom:20px;letter-spacing:2px;text-transform:uppercase}
    .login-box input{width:100%;padding:12px 14px;border:none;background:#f5f3ef;border-radius:12px;font-size:.85rem;font-family:'Manrope',sans-serif;outline:none;margin-bottom:10px}
    body.dark .login-box input{background:#1a1816;color:#e8ddd0}
    .login-box .btn{width:100%;padding:12px;border:none;border-radius:50px;background:#111;color:#fff;font-size:.75rem;font-weight:600;cursor:pointer;transition:.3s;font-family:'Manrope',sans-serif}
    .login-box .btn:hover{background:#a48b74}
    .login-box .error{color:#d32f2f;font-size:.7rem;margin-bottom:10px;display:none}
    @media(max-width:600px){.grid{grid-template-columns:1fr}.card .row{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>RUDOHAGE</h1>
    <div class="sub">Control Panel</div>
    <div class="error" id="loginError">Invalid password</div>
    <input type="password" id="adminPass" placeholder="Enter password" autofocus>
    <button class="btn" id="loginBtn">Unlock</button>
  </div>
</div>

<!-- ===== MAIN PANEL ===== -->
<div class="wrap" id="panel" style="display:none">
  <div class="header">
    <h1>RUDOHAGE <small>Control</small></h1>
    <div class="header-actions">
      <button class="outline" onclick="document.body.classList.toggle('dark')"><i class="fas fa-moon"></i></button>
      <button onclick="location.href='/'">View Site</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- ===== GRID ===== -->
  <div class="grid">

    <!-- 1. BUY BUTTON TOGGLE -->
    <div class="card">
      <h3><i class="fas fa-shopping-cart"></i> Buy Button</h3>
      <div class="toggle-wrap">
        <div class="toggle on" id="buyToggle" onclick="toggleBuy()"></div>
        <span class="toggle-label" id="buyLabel">Enabled</span>
        <span class="toggle-status">(All products)</span>
      </div>
      <p style="font-size:.6rem;opacity:.3;margin-top:4px">Disable to hide all "Buy Now" buttons on product pages</p>
    </div>

    <!-- 2. MAINTENANCE MODE -->
    <div class="card">
      <h3><i class="fas fa-tools"></i> Maintenance Mode</h3>
      <div class="toggle-wrap">
        <div class="toggle" id="maintToggle" onclick="toggleMaintenance()"></div>
        <span class="toggle-label" id="maintLabel">Off</span>
        <span class="toggle-status">(Entire site)</span>
      </div>
      <p style="font-size:.6rem;opacity:.3;margin-top:4px">Show maintenance page to all visitors</p>
    </div>

    <!-- 3. PAGE CONTENT -->
    <div class="card">
      <h3><i class="fas fa-file-alt"></i> Page Content</h3>
      <label>Select Page</label>
      <select id="pageSelect">
        <option value="about">About</option>
        <option value="privacy-policy">Privacy</option>
        <option value="terms-policy">Terms</option>
        <option value="shipping">Shipping</option>
        <option value="refund-policy">Refund</option>
        <option value="contact">Contact</option>
      </select>
      <label>Title</label>
      <input type="text" id="pageTitle" placeholder="Page title">
      <label>Content</label>
      <textarea id="pageContent" placeholder="Page content..."></textarea>
      <button class="btn" onclick="savePage()">💾 Save</button>
    </div>

    <!-- 4. THEME -->
    <div class="card">
      <h3><i class="fas fa-palette"></i> Theme</h3>
      <div class="color-picker">
        <div>
          <label>Primary</label>
          <input type="color" id="primaryColor" value="#a48b74" onchange="applyColor()">
        </div>
        <div>
          <label>Background</label>
          <input type="color" id="bgColor" value="#f6f2ea" onchange="applyColor()">
        </div>
      </div>
      <button class="btn" onclick="saveTheme()">💾 Save Theme</button>
    </div>

    <!-- 5. PRODUCTS -->
    <div class="card">
      <h3><i class="fas fa-tag"></i> Products</h3>
      <div id="productList" class="product-grid"></div>
      <hr style="margin:10px 0;border:none;border-top:1px solid rgba(0,0,0,.04)">
      <div class="row">
        <input type="text" id="newName" placeholder="Product name">
        <input type="number" id="newPrice" placeholder="Price">
      </div>
      <input type="text" id="newImg" placeholder="Image URL">
      <button class="btn" onclick="addProduct()">➕ Add</button>
    </div>

    <!-- 6. SETTINGS -->
    <div class="card">
      <h3><i class="fas fa-cog"></i> Settings</h3>
      <label>Admin Password</label>
      <input type="password" id="newPassword" placeholder="New password" value="rudohage@2024">
      <button class="btn" onclick="changePassword()">🔑 Update Password</button>
      <hr style="margin:12px 0;border:none;border-top:1px solid rgba(0,0,0,.04)">
      <label>Admin Token</label>
      <input type="text" id="adminToken" placeholder="Admin token" value="rudohage@2024#admin">
      <button class="btn" onclick="saveToken()">💾 Save Token</button>
    </div>

  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const BACKEND = "https://razorpay-backend-6yg5.onrender.com";
let ADMIN_PASSWORD = localStorage.getItem('rudohage_control_pass') || "rudohage@2024";
const PRODUCTS = {
  '1': { name: 'Inferno Core', price: 3000, img: '/image/fire-clock-1.png' },
  '2': { name: 'Crimson Orbit', price: 2500, img: '/image/fire-clock-2.png' },
  '3': { name: 'Ember Crown', price: 2500, img: '/image/fire-clock-3.png' }
};

// ============================================================
// LOGIN
// ============================================================
if (localStorage.getItem('rudohage_control_auth') === 'true') {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  loadAll();
}

document.getElementById('loginBtn').addEventListener('click', function() {
  const pass = document.getElementById('adminPass').value;
  if (pass === ADMIN_PASSWORD) {
    localStorage.setItem('rudohage_control_auth', 'true');
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('loginError').style.display = 'block';
    setTimeout(() => document.getElementById('loginError').style.display = 'none', 3000);
  }
});

document.getElementById('adminPass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

function logout() {
  localStorage.removeItem('rudohage_control_auth');
  location.reload();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t.timeout);
  t.timeout = setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// BUY BUTTON TOGGLE
// ============================================================
let buyEnabled = localStorage.getItem('rudohage_buy_enabled') !== 'false';

function toggleBuy() {
  buyEnabled = !buyEnabled;
  localStorage.setItem('rudohage_buy_enabled', buyEnabled ? 'true' : 'false');
  updateBuyUI();
  showToast(buyEnabled ? '✅ Buy button enabled' : '❌ Buy button disabled');
}

function updateBuyUI() {
  const el = document.getElementById('buyToggle');
  const label = document.getElementById('buyLabel');
  if (buyEnabled) {
    el.classList.add('on');
    label.textContent = 'Enabled';
  } else {
    el.classList.remove('on');
    label.textContent = 'Disabled';
  }
}

// ============================================================
// MAINTENANCE MODE
// ============================================================
async function toggleMaintenance() {
  const el = document.getElementById('maintToggle');
  const label = document.getElementById('maintLabel');
  const isOn = el.classList.contains('on');
  const enabled = !isOn;
  const token = document.getElementById('adminToken').value.trim() || "rudohage@2024#admin";
  
  try {
    const res = await fetch(`${BACKEND}/api/maintenance`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, enabled })
    });
    const data = await res.json();
    if (data.success) {
      if (enabled) { el.classList.add('on'); label.textContent = 'On'; }
      else { el.classList.remove('on'); label.textContent = 'Off'; }
      showToast(`✅ Maintenance ${enabled ? 'ON' : 'OFF'}`);
    } else {
      showToast('❌ Failed: ' + (data.error || 'Invalid token'));
    }
  } catch(e) {
    showToast('❌ Network error');
  }
}

async function loadMaintenanceStatus() {
  try {
    const res = await fetch(`${BACKEND}/api/status`);
    const data = await res.json();
    if (data.maintenance) {
      document.getElementById('maintToggle').classList.add('on');
      document.getElementById('maintLabel').textContent = 'On';
    } else {
      document.getElementById('maintToggle').classList.remove('on');
      document.getElementById('maintLabel').textContent = 'Off';
    }
  } catch(e) {}
}

// ============================================================
// PAGE CONTENT
// ============================================================
async function loadPageContent() {
  const slug = document.getElementById('pageSelect').value;
  try {
    const res = await fetch(`${BACKEND}/api/pages/${slug}`);
    const data = await res.json();
    if (data.success && data.page) {
      document.getElementById('pageTitle').value = data.page.title || '';
      document.getElementById('pageContent').value = data.page.content || '';
    }
  } catch(e) {}
}

document.getElementById('pageSelect').addEventListener('change', loadPageContent);

async function savePage() {
  const slug = document.getElementById('pageSelect').value;
  const title = document.getElementById('pageTitle').value;
  const content = document.getElementById('pageContent').value;
  const token = document.getElementById('adminToken').value.trim() || "rudohage@2024#admin";
  
  try {
    const res = await fetch(`${BACKEND}/api/pages/update/${slug}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, title, content })
    });
    const data = await res.json();
    if (data.success) showToast('✅ Page saved!');
    else showToast('❌ Failed');
  } catch(e) { showToast('❌ Error'); }
}

// ============================================================
// THEME
// ============================================================
function applyColor() {
  const primary = document.getElementById('primaryColor').value;
  const bg = document.getElementById('bgColor').value;
  document.documentElement.style.setProperty('--accent', primary);
  document.body.style.background = bg;
}

function saveTheme() {
  const theme = {
    primary: document.getElementById('primaryColor').value,
    bg: document.getElementById('bgColor').value
  };
  localStorage.setItem('rudohage_theme', JSON.stringify(theme));
  showToast('✅ Theme saved!');
}

function loadTheme() {
  try {
    const theme = JSON.parse(localStorage.getItem('rudohage_theme'));
    if (theme) {
      document.getElementById('primaryColor').value = theme.primary || '#a48b74';
      document.getElementById('bgColor').value = theme.bg || '#f6f2ea';
      applyColor();
    }
  } catch(e) {}
}

// ============================================================
// PRODUCTS
// ============================================================
function loadProducts() {
  const container = document.getElementById('productList');
  container.innerHTML = '';
  Object.entries(PRODUCTS).forEach(([id, p]) => {
    container.innerHTML += `
      <div class="product-card">
        <img src="${p.img}" onerror="this.src='/logo.png'">
        <div class="pname">${p.name}</div>
        <div class="pprice">₹${p.price}</div>
        <div class="pactions">
          <button class="del" onclick="deleteProduct('${id}')"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `;
  });
}

function addProduct() {
  const name = document.getElementById('newName').value.trim();
  const price = document.getElementById('newPrice').value.trim();
  const img = document.getElementById('newImg').value.trim() || '/logo.png';
  if (!name || !price) { showToast('❌ Name and price required'); return; }
  // Add to local
  const id = Date.now().toString();
  PRODUCTS[id] = { name, price: Number(price), img };
  loadProducts();
  document.getElementById('newName').value = '';
  document.getElementById('newPrice').value = '';
  document.getElementById('newImg').value = '';
  showToast('✅ Product added! (Local only - backend API needed for permanent)');
}

function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  delete PRODUCTS[id];
  loadProducts();
  showToast('✅ Deleted (Local only)');
}

// ============================================================
// SETTINGS
// ============================================================
function changePassword() {
  const newPass = document.getElementById('newPassword').value.trim();
  if (!newPass || newPass.length < 4) { showToast('❌ Password must be at least 4 characters'); return; }
  ADMIN_PASSWORD = newPass;
  localStorage.setItem('rudohage_control_pass', newPass);
  showToast('✅ Password updated!');
}

function saveToken() {
  const token = document.getElementById('adminToken').value.trim();
  if (!token) { showToast('❌ Token required'); return; }
  localStorage.setItem('rudohage_admin_token', token);
  showToast('✅ Token saved locally! (Backend token change needs API)');
}

// ============================================================
// LOAD ALL
// ============================================================
function loadAll() {
  updateBuyUI();
  loadMaintenanceStatus();
  loadPageContent();
  loadTheme();
  loadProducts();
  // Load saved token
  const savedToken = localStorage.getItem('rudohage_admin_token');
  if (savedToken) document.getElementById('adminToken').value = savedToken;
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e) {
  if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
    return false;
  }
};
</script>
<script src="/toast.js"></script>
</body>
</html>
