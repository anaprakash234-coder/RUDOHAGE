<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=myaccount.html">

<title>RUDOHAGE | My Orders</title>

<link rel="icon" type="image/png" href="/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Manrope:wght@400&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ea;
--text:#111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Manrope',sans-serif;
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:1.8rem;
margin-bottom:15px;
}

p{
opacity:.65;
margin-bottom:25px;
}

a{
text-decoration:none;
color:#111;
border:1px solid rgba(0,0,0,.2);
padding:14px 30px;
border-radius:50px;
font-size:.8rem;
letter-spacing:2px;
text-transform:uppercase;
transition:.3s;
}

a:hover{
background:#111;
color:white;
}

.loader{
width:36px;
height:36px;
border:3px solid #ddd;
border-top:3px solid #111;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:25px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="loader"></div>

<h1>My Orders Has Moved</h1>
<p>Your orders now live inside My Account — taking you there now.</p>

<a href="myaccount.html">Go To My Account</a>

<script>
window.location.href = "myaccount.html";
</script>

</body>
</html>
