<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="icon" type="image/png" href="logo.png">

<title>RUDOHAGE | My Orders</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#f6f2ea;
font-family:'Manrope',sans-serif;
padding:140px 8% 60px;
text-align:center;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:4rem;
margin-bottom:20px;
}

input{
width:100%;
max-width:500px;
padding:18px;
border:none;
background:white;
border-radius:14px;
margin-top:20px;
}

button{
margin-top:20px;
padding:16px 35px;
border:none;
background:black;
color:white;
border-radius:50px;
cursor:pointer;
}

#ordersContainer{
margin-top:50px;
}

.small-title{
letter-spacing:5px;
font-size:11px;
text-transform:uppercase;
opacity:.6;
margin-bottom:15px;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:2rem;
font-weight:600;
margin-bottom:15px;
}

.hero-text{
opacity:.7;
max-width:600px;
margin:auto;
line-height:1.8;
margin-bottom:40px;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
padding:1.2rem 2rem;
background:rgba(246,242,234,.65);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(0,0,0,.08);
}

.logo{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2rem;
font-weight:600;
}

.product-header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;

padding:1.3rem 4rem;

background:rgba(246,242,234,0.55);
backdrop-filter:blur(18px);

border-bottom:1px solid rgba(0,0,0,0.08);

display:flex;
align-items:center;
}

.product-brand{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2.1rem;
font-weight:600;
letter-spacing:-1px;
}

.order-card{
background:white;
padding:35px;
border-radius:24px;
margin-top:25px;
box-shadow:0 10px 40px rgba(0,0,0,.05);
text-align:left;
}

.order-product{
font-family:'Cormorant Garamond',serif;
font-size:2.3rem;
margin-bottom:10px;
}

.order-piece{
font-size:11px;
letter-spacing:4px;
text-transform:uppercase;
opacity:.6;
margin-bottom:15px;
}

.order-status{
display:inline-block;
padding:10px 18px;
border-radius:50px;
background:black;
color:white;
font-size:12px;
letter-spacing:2px;
margin-top:15px;
}

@media(max-width:768px){

.product-header{
justify-content:center;
padding:10px 0;
text-align:center;
}

.product-brand{
font-size:1.3rem;
width:100%;
text-align:center;
}

}

.progress-bar{
width:100%;
height:8px;
background:#eee;
border-radius:20px;
margin:20px 0;
overflow:hidden;
}

.progress-fill{
height:100%;
background:#111;
border-radius:20px;
transition:1s;
}

.timeline{
margin-top:20px;
padding:20px;
background:#fafafa;
border-radius:15px;
}

.timeline div{
margin:10px 0;
}

.order-actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.action-btn{
padding:10px 15px;
border:none;
border-radius:30px;
background:#111;
color:#fff;
cursor:pointer;
text-decoration:none;
font-size:13px;
}

.countdown{
margin-top:15px;
font-size:14px;
opacity:.7;
}

</style>
</head>

<body>

    <header class="product-header">

<a href="index.html" class="product-brand">
RUDOHAGE
</a>

</header>

<div class="small-title">
ORDER ARCHIVE
</div>

<h1>
My Collection
</h1>

<p class="hero-text">
Every handcrafted piece leaves a trace.
</p>

<input
type="text"
id="phone"
placeholder="Enter Your Phone Number">

<br>

<button id="searchBtn">
View My Orders
</button>

<div id="ordersContainer">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "rudohage.firebaseapp.com",
projectId: "rudohage",
storageBucket: "rudohage.firebasestorage.app",
messagingSenderId: "487042116246",
appId: "1:487042116246:web:990d65636addd6d653f0b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("searchBtn")
.addEventListener("click", async ()=>{

const phone =
document.getElementById("phone").value.trim();

const container =
document.getElementById("ordersContainer");

container.innerHTML = "";

const snapshot =
await getDocs(collection(db,"orders"));

let found = false;

snapshot.forEach((doc)=>{

const order = doc.data();

if(order.phone === phone){

found = true;

let progress = 33;

if(order.status === "Shipped"){
progress = 66;
}

if(order.status === "Delivered"){
progress = 100;
}

container.innerHTML += `
<div class="order-card">

<div class="order-piece">
RUDOHAGE ARCHIVE
</div>

<div class="order-product">
${order.product}
</div>

<p>Price: ₹${order.price}</p>

<div class="order-status">
${order.status}
</div>

<div class="progress-bar">
<div class="progress-fill"
style="width:${progress}%">
</div>
</div>

<div class="timeline">

<div>
${progress >= 33 ? "✔" : "○"}
 Order Placed
</div>

<div>
${progress >= 66 ? "✔" : "○"}
 Shipped
</div>

<div>
${progress >= 100 ? "✔" : "○"}
 Delivered
</div>

</div>

<div class="countdown">
Estimated Delivery:
3 - 5 Business Days
</div>

<div class="order-actions">

<button
class="action-btn"
onclick="copyOrderId('${doc.id}')">
Copy Order ID
</button>

<a
class="action-btn"
href="https://wa.me/917091955862?text=My Order ID is ${doc.id}"
target="_blank">
WhatsApp Support
</a>

</div>

</div>
`;
}

});

if(!found){

container.innerHTML = `
<p>No Orders Found</p>
`;

}

});

</script>

<script>
function copyOrderId(id){

navigator.clipboard.writeText(id);

alert("Order ID Copied!");

}
</script>

</body>
</html>
