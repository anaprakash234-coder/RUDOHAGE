
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" type="image/png" href="/logo.png"><title>Order Confirmed | RUDOHAGE</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script></head>

nt-size:18px"><b>${t.name}</b><br><br>${t.address}<br>${t.city}<br>${t.pincode}<br><br>Phone: ${t.phone}</div><br><br><button onclick="window.print()">Print / Save PDF</button></div></body></html>`)});
