<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Order Confirmed | RUDOHAGE</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6f2ea;font-family:'Manrope',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.hdr{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:.7rem 1.5rem;background:rgba(246,242,234,.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.04);display:flex;align-items:center;justify-content:space-between}.brand{text-decoration:none;color:#111;font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700}.back{text-decoration:none;color:rgba(20,20,20,.5);font-size:.7rem;letter-spacing:2px;text-transform:uppercase}.back:hover{color:#111}.container{max-width:550px;width:100%;background:#fff;border-radius:24px;padding:50px 35px;text-align:center;box-shadow:0 25px 80px rgba(0,0,0,0.06);margin-top:70px;position:relative;overflow:hidden}.container::before{content:"";position:absolute;top:0;left:0;width:100%;height:4px;background:linear-gradient(90deg,#a48b74,#8a715c)}.icon-wrap{width:80px;height:80px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}.icon-wrap i{font-size:40px;color:#4caf50}h1{font-family:'Cormorant Garamond',serif;font-size:32px;color:#111;margin-bottom:6px}.sub-text{font-size:14px;color:#888;margin-bottom:25px}.order-id-box{background:#f6f2ea;padding:14px;border-radius:12px;font-size:13px;color:#555;margin-bottom:25px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}.order-id-box strong{color:#111}.copy-btn{background:0 0;border:none;color:#a48b74;cursor:pointer;font-size:14px}.copy-btn:hover{color:#8a715c}.divider{width:50px;height:2px;background:#a48b74;margin:20px auto;opacity:.3}.details{text-align:left;font-size:14px;margin:20px 0;background:#fafafa;padding:20px;border-radius:14px}.details div{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0ede8}.details div:last-child{border-bottom:none}.details span:last-child{color:#111;font-weight:600}.btn-group{display:flex;flex-direction:column;gap:12px;margin-top:10px}.btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:15px 24px;border-radius:50px;font-weight:600;font-size:14px;text-decoration:none;cursor:pointer;transition:.3s;border:none;font-family:'Manrope',sans-serif;width:100%}.btn-primary{background:#111;color:#fff}.btn-primary:hover{background:#333;transform:translateY(-2px)}.btn-secondary{background:#f6f2ea;color:#111}.btn-secondary:hover{background:#ede8e0;transform:translateY(-2px)}.btn-outline{background:0 0;color:#a48b74;border:2px solid #a48b74}.btn-outline:hover{background:#a48b74;color:#fff}.home-link{margin-top:18px;display:inline-block;color:#a48b74;text-decoration:none;font-size:13px}.home-link:hover{text-decoration:underline}.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;opacity:0;transition:.4s;z-index:999;pointer-events:none}.toast.show{opacity:1}@media(max-width:480px){.container{padding:30px 20px}.hdr{padding:.6rem 1rem}.brand{font-size:1.1rem}}</style></head><body><header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back">← Back</a></header><div class="container"><div class="icon-wrap"><i class="fas fa-check-circle"></i></div><h1>Order Confirmed!</h1><p class="sub-text">Your handcrafted piece is being prepared.</p><div class="order-id-box"><span>Order #<strong id="o">Loading...</strong></span><button class="copy-btn" id="c"><i class="fas fa-copy"></i> Copy</button></div><div class="divider"></div><div class="details"><div><span>Product</span><span id="p">-</span></div><div><span>Amount</span><span id="a">₹0</span></div><div><span>Payment</span><span id="pm">-</span></div><div><span>Delivery</span><span id="d">3-5 Business Days</span></div></div><div class="divider"></div><div class="btn-group"><a href="#" class="btn btn-primary" id="t"><i class="fas fa-truck"></i> Track Order</a><button class="btn btn-secondary" id="i"><i class="fas fa-file-pdf"></i> Download Invoice</button><a href="/" class="btn btn-outline"><i class="fas fa-home"></i> Back to Home</a></div><a href="/" class="home-link">← Continue Shopping</a></div><div class="toast" id="toast"></div><script>
const BACKEND = "https://razorpay-backend-6yg5.onrender.com";
const s = new URLSearchParams(location.search), o = s.get("orderId");
document.getElementById("o").textContent = o ? o.slice(-8).toUpperCase() : "N/A";

async function loadOrder() {
  if (!o) return;
  try {
    const res = await fetch(`${BACKEND}/api/order/${o}`);
    if (!res.ok) throw new Error("Order not found");
    const data = await res.json();
    document.getElementById("p").textContent = data.product || "-";
    document.getElementById("a").textContent = "₹" + (data.price || 0);
    document.getElementById("pm").textContent = data.payment || "-";
  } catch(e) {
    console.error("Error fetching order:", e);
  }
}
loadOrder();

document.getElementById("c").onclick = () => {
  if (o) { navigator.clipboard.writeText(o); showToast("✅ Copied!"); }
};

document.getElementById("t").onclick = e => {
  e.preventDefault();
  if (o) location.href = `/track/?orderId=${o}`;
};

document.getElementById("i").onclick = async () => {
  if (!o) return showToast("⚠️ No ID");
  showToast("📄 Generating...");
  try {
    const res = await fetch(`${BACKEND}/api/order/${o}`);
    if (!res.ok) throw new Error("Order not found");
    const data = await res.json();
    const im = {"Inferno Core":"https://rudohage.com/image/fire-clock-1.png","Crimson Orbit":"https://rudohage.com/image/fire-clock-2.png","Ember Crown":"https://rudohage.com/image/fire-clock-3.png"}[data.product]||"https://rudohage.com/logo.png";
    const H = `<html><head><title>Invoice #${o.slice(-8).toUpperCase()}</title><style>body{background:#f6f2ea;font-family:'Manrope',sans-serif;padding:40px;display:flex;justify-content:center}.invoice{max-width:800px;background:#fff;border-radius:20px;padding:50px;box-shadow:0 20px 60px rgba(0,0,0,.08)}.logo{font-family:'Cormorant Garamond',serif;font-size:42px;text-align:center}.tagline{text-align:center;letter-spacing:4px;font-size:11px;color:#888;margin:4px 0 20px}.content{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin:25px 0}.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0ede8}.label{color:#888}.value{font-weight:600}.product-img{max-width:200px;border-radius:14px;display:block;margin:0 auto;box-shadow:0 8px 30px rgba(0,0,0,.1)}.total{background:#f6f2ea;padding:20px;border-radius:14px;display:flex;justify-content:space-between;font-size:20px;font-weight:700}.footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #eee;font-size:12px;color:#888}.footer a{color:#a48b74}@media print{body{background:#fff}.invoice{box-shadow:none}}</style></head><body><div class="invoice"><div class="logo">RUDOHAGE</div><div class="tagline">NOT PRODUCED. CRAFTED.</div><div style="text-align:center;font-size:13px;color:#a48b74;font-weight:600">INVOICE #${o.slice(-8).toUpperCase()}</div><img src="${im}" class="product-img"><div class="content"><div><h3 style="font-family:'Cormorant Garamond'">Order Details</h3><div class="row"><span class="label">Order ID</span><span class="value">${o}</span></div><div class="row"><span class="label">Date</span><span class="value">${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</span></div><div class="row"><span class="label">Payment</span><span class="value">${data.payment||"UPI"}</span></div></div><div><h3 style="font-family:'Cormorant Garamond'">Shipping To</h3><div class="row"><span class="label">Name</span><span class="value">${data.name||"N/A"}</span></div><div class="row"><span class="label">Phone</span><span class="value">${data.phone||"N/A"}</span></div><div class="row"><span class="label">Address</span><span class="value">${data.address||"N/A"}</span></div><div class="row"><span class="label">City</span><span class="value">${data.city||"N/A"}</span></div><div class="row"><span class="label">Pincode</span><span class="value">${data.pincode||"N/A"}</span></div></div></div><div style="margin:20px 0"><h3 style="font-family:'Cormorant Garamond'">Product</h3><div style="background:#fafafa;padding:15px;border-radius:12px;display:flex;justify-content:space-between"><span>${data.product||"RUDOHAGE Piece"}</span><span style="font-weight:700;color:#a48b74">₹${data.price||0}</span></div></div><div class="total"><span>Total</span><span>₹${data.price||0}</span></div><div class="footer"><p>Thank you for your order!</p><p>Questions? <a href="https://wa.me/917091955862">Chat on WhatsApp</a></p></div></div><script>window.onload=setTimeout(window.print,500);<\/script></body></html>`;
    const w = window.open("", "_blank");
    w ? (w.document.write(H), w.document.close(), showToast("✅ Invoice ready!")) : showToast("⚠️ Popup blocked");
  } catch(e) { console.error(e); showToast("⚠️ Error generating invoice"); }
};

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t.timeout);
  t.timeout = setTimeout(() => t.classList.remove("show"), 3000);
}
</script></body></html>
