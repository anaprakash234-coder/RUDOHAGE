n}.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#a48b74,transparent)}.card h2{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}.card h2 i{color:#a48b74;font-size:14px}.card p,.card li{font-size:.72rem;opacity:.55;line-height:1.8}.card a{color:#a48b74;text-decoration:none}.card ul{padding-left:16px;margin-top:8px}.card li{margin-bottom:6px}.sig{text-align:center;padding:28px 0 10px}.sig p{font-size:.6rem;letter-spacing:3px;opacity:.2;text-transform:uppercase}.sig h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem}.loading{text-align:center;padding:60px 0;opacity:.4}@media(max-width:500px){.wrap{padding:80px 12px 20px}.hero h1{font-size:1.4rem}.card{padding:16px 14px}}</style></head><body><div class="glow"></div><header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back">← Back</a></header><div class="wrap"><div class="hero"><span id="pageTag">Shipping</span><h1 id="pageTitleHero">Shipping Policy</h1><p id="pageSub">Every piece is handcrafted, inspected, and packaged before dispatch.</p></div><div class="divider"></div><div id="pageContent"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div><div class="sig"><p>Not Produced. Crafted.</p><h2>RUDOHAGE</h2></div></div>
