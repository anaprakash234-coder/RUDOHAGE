<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" type="image/png" href="logo.png">

<title>Order Confirmed | RUDOHAGE</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#f6f2ea;
font-family:'Manrope',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
max-width:700px;
width:100%;
padding:50px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

.small{
letter-spacing:4px;
font-size:11px;
opacity:.6;
margin-bottom:20px;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:4rem;
margin-bottom:20px;
}

.order-id{
background:#f4f4f4;
padding:18px;
border-radius:14px;
margin:25px 0;
font-weight:700;
word-break:break-all;
}

.btn{
display:inline-block;
padding:16px 35px;
background:black;
color:white;
text-decoration:none;
border-radius:50px;
margin-top:20px;
}

@media(max-width:768px){

h1{
font-size:2.5rem;
}

.card{
padding:30px;
}

}

  .product-header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;

padding:1.3rem 4rem;

background:rgba(246,242,234,0.55);
backdrop-filter:blur(18px);

border-bottom:1px solid rgba(0,0,0,0.08);

display:flex;
align-items:center;
}

.product-brand{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2.1rem;
font-weight:600;
letter-spacing:-1px;
}

@media(max-width:768px){

.product-header{
justify-content:center;
padding:10px 0;
text-align:center;
}

.product-brand{
font-size:1.3rem;
width:100%;
text-align:center;
}

}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

  <header class="product-header">

<a href="index.html" class="product-brand">
RUDOHAGE
</a>

</header>

<div class="card">

<div class="small">
ORDER CONFIRMED
</div>

<h1>
Thank You
</h1>

<p>
Your handcrafted RUDOHAGE piece has been successfully reserved.
</p>

<div class="order-id" id="orderId">
Loading...
</div>

<a id="trackBtn" class="btn">
Track My Order
</a>

<br>

<button id="invoiceBtn" class="btn" style="margin-left:10px;">
Download Invoice
</button>

</div>


    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "rudohage.firebaseapp.com",
projectId: "rudohage",
storageBucket: "rudohage.firebasestorage.app",
messagingSenderId: "487042116246",
appId: "1:487042116246:web:990d65636addd6d653f0b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const orderId = params.get("orderId");


document.getElementById("orderId").innerText =
"Order ID: " + orderId;

document.getElementById("trackBtn").href =
`track.html?orderId=${orderId}`;

document.getElementById("invoiceBtn")
.addEventListener("click", async ()=>{

const snap = await getDoc(doc(db,"orders",orderId));

if(!snap.exists()){
alert("Order Not Found");
return;
}

const order = snap.data();

let productImage = "";

if(order.product === "Inferno Core"){
productImage =
"https://rudohage.com/image/fire-clock-1.png";
}

else if(order.product === "Crimson Orbit"){
productImage =
"https://rudohage.com/image/fire-clock-2.png";
}

else{
productImage =
"https://rudohage.com/image/fire-clock-3.png";
}

const invoiceNo =
"RUD-" + orderId.slice(0,8).toUpperCase();

const invoiceWindow = window.open("","_blank");

invoiceWindow.document.write(`
<html>
<head>
<title>Invoice</title>
<style>
body{
background:#f6f2ea;
padding:50px;
font-family:'Manrope',sans-serif;
color:#111;
}

.invoice{
max-width:900px;
margin:auto;
background:white;
padding:50px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:60px;
text-align:center;
margin-bottom:10px;
}

.tagline{
text-align:center;
letter-spacing:4px;
font-size:12px;
opacity:.6;
margin-bottom:40px;
}

.section{
margin-top:35px;
}

.divider{
height:1px;
background:#ddd;
margin:30px 0;
}

.shipping{
border:2px solid #111;
padding:25px;
border-radius:15px;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
}

.print-btn{
background:black;
color:white;
border:none;
padding:15px 30px;
border-radius:50px;
cursor:pointer;
margin-top:30px;
}

h1{
text-align:center;
}
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}
td,th{
border:1px solid #ddd;
padding:10px;
}
</style>
</head>
<body>

<div class="invoice">

<div class="logo">
RUDOHAGE
</div>

<div class="tagline">
NOT PRODUCED. CRAFTED.
</div>

<div style="text-align:center">

<img
src="${productImage}"
style="
width:250px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
">

</div>

<table>
<tr>
<th>Order ID</th>
<td>${orderId}</td>
</tr>

<tr>
<th>Invoice Number</th>
<td>${invoiceNo}</td>
</tr>

<tr>
<th>Name</th>
<td>${order.name}</td>
</tr>

<tr>
<th>Phone</th>
<td>${order.phone}</td>
</tr>

<tr>
<th>Address</th>
<td>${order.address}</td>
</tr>

<tr>
<th>City</th>
<td>${order.city}</td>
</tr>

<tr>
<th>Pincode</th>
<td>${order.pincode}</td>
</tr>

<tr>
<th>Product</th>
<td>${order.product}</td>
</tr>

<tr>
<th>Order Date</th>
<td>${order.orderDate}</td>
</tr>

<tr>
<th>Price</th>
<td>₹${order.price}</td>
</tr>

<tr>
<th>Payment</th>
<td>${order.payment}</td>
</tr>

</table>

<hr>

<h2>Shipping Label</h2>

<div style="
border:2px solid black;
padding:20px;
margin-top:20px;
font-size:18px;
">

<b>${order.name}</b>

<br><br>

${order.address}

<br>

${order.city}

<br>

${order.pincode}

<br><br>

Phone:
${order.phone}

</div>

<br><br>

<button onclick="window.print()">
Print / Save PDF
</button>

</body>
</html>
`);

});

</script>

<script>


document.onkeydown = function(e) {
    if (
        e.keyCode == 123 ||
        (e.ctrlKey && e.shiftKey && e.keyCode == 73) ||
        (e.ctrlKey && e.shiftKey && e.keyCode == 74) ||
        (e.ctrlKey && e.keyCode == 85)
    ) {
        return false;
    }
};
</script>

</body>
</html>
