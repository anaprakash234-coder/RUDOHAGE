<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Confirmed | RUDOHAGE</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#f6f2ea;
font-family:'Manrope',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
max-width:700px;
width:100%;
padding:50px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

.small{
letter-spacing:4px;
font-size:11px;
opacity:.6;
margin-bottom:20px;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:4rem;
margin-bottom:20px;
}

.order-id{
background:#f4f4f4;
padding:18px;
border-radius:14px;
margin:25px 0;
font-weight:700;
word-break:break-all;
}

.btn{
display:inline-block;
padding:16px 35px;
background:black;
color:white;
text-decoration:none;
border-radius:50px;
margin-top:20px;
}

@media(max-width:768px){

h1{
font-size:2.5rem;
}

.card{
padding:30px;
}

}

  .product-header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;

padding:1.3rem 4rem;

background:rgba(246,242,234,0.55);
backdrop-filter:blur(18px);

border-bottom:1px solid rgba(0,0,0,0.08);

display:flex;
align-items:center;
}

.product-brand{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2.1rem;
font-weight:600;
letter-spacing:-1px;
}

@media(max-width:768px){

.product-header{
justify-content:center;
padding:10px 0;
text-align:center;
}

.product-brand{
font-size:1.3rem;
width:100%;
text-align:center;
}

}

</style>
</head>
<body>

  <header class="product-header">

<a href="index.html" class="product-brand">
RUDOHAGE
</a>

</header>

<div class="card">

<div class="small">
ORDER CONFIRMED
</div>

<h1>
Thank You
</h1>

<p>
Your handcrafted RUDOHAGE piece has been successfully reserved.
</p>

<div class="order-id" id="orderId">
Loading...
</div>

<a id="trackBtn" class="btn">
Track My Order
</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const orderId = params.get("orderId");

document.getElementById("orderId").innerText =
"Order ID: " + orderId;

document.getElementById("trackBtn").href =
`track.html?orderId=${orderId}`;

</script>

</body>
</html>
