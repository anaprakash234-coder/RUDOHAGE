<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUDOHAGE | Verify Your Email</title>

<link rel="icon" type="image/png" href="/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ea;
--text:#111;
--accent:#a48b74;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Manrope',sans-serif;
color:var(--text);
min-height:100vh;
overflow:hidden;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
padding:1.2rem 2rem;
background:rgba(246,242,234,.65);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:999;
}

.logo{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2rem;
font-weight:600;
}

.container{
min-height:calc(100vh - 100px);
display:grid;
grid-template-columns:1.2fr 0.8fr;
align-items:center;
padding:100px 8%;
gap:80px;
}

.left h1{
font-family:'Cormorant Garamond',serif;
font-size:5.5rem;
line-height:0.95;
margin-bottom:25px;
}

.left p{
font-size:17px;
opacity:.65;
max-width:500px;
line-height:1.8;
}

.badge{
display:inline-block;
margin-bottom:20px;
font-size:12px;
letter-spacing:4px;
opacity:.5;
}

.card{
background:white;
padding:45px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

.card h2{
font-family:'Cormorant Garamond',serif;
font-size:2.3rem;
margin-bottom:10px;
}

.card .sub{
opacity:.6;
font-size:14px;
margin-bottom:30px;
line-height:1.7;
}

.card .sub strong{
color:#111;
opacity:1;
}

.otp-input{
width:100%;
padding:20px;
margin-bottom:18px;
border:none;
outline:none;
background:#f7f7f7;
border-radius:14px;
font-size:1.8rem;
text-align:center;
letter-spacing:10px;
font-weight:600;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:#111;
color:white;
font-size:13px;
letter-spacing:3px;
margin-top:5px;
}

.resend-row{
text-align:center;
margin-top:22px;
font-size:13px;
opacity:.65;
}

.resend-row a{
color:#111;
font-weight:600;
text-decoration:none;
opacity:1;
}

.resend-row a.disabled{
opacity:.4;
pointer-events:none;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
text-decoration:none;
color:#111;
opacity:.5;
font-size:13px;
}

.blur-circle{
position:fixed;
width:400px;
height:400px;
background:white;
border-radius:50%;
filter:blur(120px);
top:-100px;
right:-100px;
opacity:.5;
pointer-events:none;
}

/* SESSION CHECK */
.session-check{
position:fixed;
inset:0;
background:var(--bg);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:99999;
gap:18px;
}

.session-check .loader{
width:46px;
height:46px;
border:3px solid #ddd;
border-top:3px solid #111;
border-radius:50%;
animation:spin 1s linear infinite;
}

.session-check span{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
opacity:.55;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

#pageContent{
display:none;
}

.btn-spinner{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,.4);
border-top:2px solid #ffffff;
border-radius:50%;
display:inline-block;
animation:btnSpin .7s linear infinite;
vertical-align:middle;
}

.btn-spinner-sm{
width:13px;
height:13px;
border:2px solid rgba(17,17,17,.25);
border-top:2px solid #111;
border-radius:50%;
display:inline-block;
animation:btnSpin .7s linear infinite;
vertical-align:middle;
}

@keyframes btnSpin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
gap:40px;
padding:110px 25px 40px;
}

.left h1{
font-size:3.2rem;
}

.card{
padding:30px;
}

body{
overflow-y:auto;
overflow-x:hidden;
}

.container{
min-height:auto;
}

.left{
text-align:center;
}

.left p{
font-size:14px;
max-width:100%;
margin:0 auto;
}

}

@media(max-width:480px){

.header{
padding:1rem 1.2rem;
}

.left h1{
font-size:2.4rem;
}

.card{
padding:22px;
}

.otp-input{
font-size:1.4rem;
letter-spacing:6px;
}

}

</style>
</head>

<body>

<div class="session-check" id="sessionCheck">
  <div class="loader"></div>
  <span>Checking Session...</span>
</div>

<div id="pageContent">

<div class="blur-circle"></div>

<header class="header">
<a href="index.html" class="logo">RUDOHAGE</a>
</header>

<div class="container">

<div class="left">

<div class="badge">
ONE STEP LEFT
</div>

<h1>
Verify<br>
Your Archive
</h1>

<p>
For everyone's security, we confirm every email before it joins the
RUDOHAGE collector archive. It only takes a moment.
</p>

</div>

<div class="card">

<h2>Enter Verification Code</h2>

<div class="sub">
We've sent a 6-digit code to <strong id="userEmail"></strong>
</div>

<input
type="text"
inputmode="numeric"
maxlength="6"
class="otp-input"
placeholder="------"
id="otpInput">

<button class="btn" id="verifyBtn">
VERIFY CODE
</button>

<div class="resend-row">
Didn't get the code?
<a href="#" id="resendBtn">Resend Code</a>
</div>

<div class="links">
<a href="#" id="logoutLink">Use a different account</a>
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import {
getFirestore,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "rudohage.firebaseapp.com",
projectId: "rudohage",
storageBucket: "rudohage.firebasestorage.app",
messagingSenderId: "487042116246",
appId: "1:487042116246:web:990d65636addd6d653f0b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const OTP_API_BASE = "https://razorpay-backend-6yg5.onrender.com";
const params = new URLSearchParams(window.location.search);
const redirectTo = params.get("redirect");

function goAfterVerify(){
if(redirectTo){
window.location.href = decodeURIComponent(redirectTo);
}else{
window.location.href = "myaccount.html";
}
}

function setBtnLoading(btn, isLoading){
if(isLoading){
btn.dataset.originalText = btn.innerHTML;
btn.innerHTML = '<span class="btn-spinner"></span>';
btn.disabled = true;
}else{
btn.innerHTML = btn.dataset.originalText;
btn.disabled = false;
}
}

let currentUser = null;

onAuthStateChanged(auth, async (user) => {
if(!user){
window.location.href = "login.html";
return;
}

try {
const snap = await getDoc(doc(db,"users",user.uid));
if (snap.exists()) {
  const data = snap.data();
  if (data && data.emailVerified === true) {
    goAfterVerify();
    return;
  }
}

currentUser = user;
document.getElementById("userEmail").innerText = user.email;
document.getElementById("sessionCheck").style.display = "none";
document.getElementById("pageContent").style.display = "block";

} catch (err) {
console.error(err);
window.location.href = "login.html";
}
});

document.getElementById("verifyBtn").addEventListener("click", async () => {
const otp = document.getElementById("otpInput").value.trim();

if(!otp || otp.length !== 6){
alert("Please enter the 6-digit code");
return;
}

const verifyBtn = document.getElementById("verifyBtn");
setBtnLoading(verifyBtn, true);

try{
const res = await fetch(OTP_API_BASE + "/verify-otp", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({ email: currentUser.email, otp })
});

const result = await res.json();

if(result.success){
await updateDoc(doc(db,"users",currentUser.uid), { emailVerified: true });
goAfterVerify();
}else{
setBtnLoading(verifyBtn, false);
alert(result.message || "Invalid code, please try again");
}
}catch(err){
setBtnLoading(verifyBtn, false);
alert("Something went wrong. Please try again.");
}
});

let resendCooldown = 0;
let resendTimer = null;

document.getElementById("resendBtn").addEventListener("click", async (e) => {
e.preventDefault();
if(resendCooldown > 0) return;

const resendBtn = document.getElementById("resendBtn");
const originalText = resendBtn.innerText;
resendBtn.innerHTML = '<span class="btn-spinner-sm"></span>';
resendBtn.classList.add("disabled");

try{
await fetch(OTP_API_BASE + "/send-otp", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({ email: currentUser.email })
});
alert("A new code has been sent to " + currentUser.email);
}catch(err){
resendBtn.innerText = originalText;
resendBtn.classList.remove("disabled");
alert("Couldn't resend code, please try again in a moment.");
return;
}

resendCooldown = 30;
resendBtn.innerText = "Resend Code (" + resendCooldown + "s)";

resendTimer = setInterval(() => {
resendCooldown--;
resendBtn.innerText = "Resend Code (" + resendCooldown + "s)";

if(resendCooldown <= 0){
clearInterval(resendTimer);
resendBtn.innerText = "Resend Code";
resendBtn.classList.remove("disabled");
}
}, 1000);
});

document.getElementById("logoutLink").addEventListener("click", async (e) => {
e.preventDefault();
await signOut(auth);
window.location.href = "login.html";
});

</script>
<script src="/toast.js"></script>
</body>
</html>
