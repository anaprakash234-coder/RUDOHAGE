<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="/logo.png"><title>Login | RUDOHAGE</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6f2ea;font-family:'Manrope',sans-serif;color:#111;line-height:1.5;min-height:100vh;position:relative;overflow:hidden}.glow{position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(164,139,116,.15),transparent 70%);pointer-events:none;z-index:0}.glow2{position:fixed;bottom:-150px;left:-150px;width:400px;height:400px;background:radial-gradient(circle,rgba(0,0,0,.06),transparent 70%);pointer-events:none;z-index:0}.hdr{position:fixed;top:0;left:0;width:100%;z-index:999;padding:12px 28px;background:rgba(246,242,234,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.04);display:flex;justify-content:space-between;align-items:center}.brand{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;text-decoration:none;color:#111;letter-spacing:-.5px}.back{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;color:rgba(0,0,0,.45);transition:.3s}.back:hover{color:#111}.wrap{position:relative;z-index:1;display:grid;grid-template-columns:1.1fr .9fr;gap:50px;max-width:850px;width:100%;margin:100px auto 0;padding:0 20px;align-items:center}.hero .badge{display:inline-block;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#a48b74;margin-bottom:12px;padding:4px 12px;border:1px solid rgba(164,139,116,.25);border-radius:50px}.hero h1{font-family:'Cormorant Garamond',serif;font-size:3.2rem;line-height:.95;margin-bottom:10px;font-style:italic;letter-spacing:-1px}.hero h1 span{font-style:normal;font-weight:300;display:block;font-size:1.8rem;opacity:.4;letter-spacing:0}.hero p{font-size:.75rem;opacity:.45;max-width:300px;line-height:1.7}.card{background:#fff;border-radius:18px;padding:28px 26px;box-shadow:0 8px 40px rgba(0,0,0,.06);position:relative;overflow:hidden}.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#a48b74,transparent)}.card h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;margin-bottom:18px;letter-spacing:-.5px}.card label{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;opacity:.4;display:block;margin-bottom:4px;margin-top:2px}.card input{width:100%;padding:11px 14px;margin-bottom:12px;border:none;background:#f5f3ef;border-radius:10px;font-size:.78rem;font-family:'Manrope',sans-serif;outline:none;transition:.3s}.card input:focus{background:#eeeae3;box-shadow:0 0 0 3px rgba(164,139,116,.1)}.btn,.gbtn{width:100%;padding:12px;border:none;border-radius:50px;cursor:pointer;font-size:.75rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:'Manrope',sans-serif;transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px}.btn{background:#111;color:#fff;margin-top:6px}.btn:hover{background:#a48b74;transform:translateY(-2px);box-shadow:0 8px 24px rgba(164,139,116,.25)}.gbtn{background:#fff;color:#111;border:1px solid rgba(0,0,0,.1);margin-top:8px}.gbtn:hover{background:#f9f9f9;transform:translateY(-2px)}.gbtn i{font-size:14px}.divider{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:.6rem;opacity:.3;letter-spacing:1px;text-transform:uppercase}.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(0,0,0,.1)}.links{text-align:center;margin-top:14px;font-size:.65rem}.links a{text-decoration:none;color:#111;opacity:.45;transition:.3s}.links a:hover{opacity:1;color:#a48b74}@media(max-width:650px){body{overflow-y:auto;overflow-x:hidden}.wrap{grid-template-columns:1fr;gap:25px;margin-top:75px}.hero{text-align:center}.hero h1{font-size:2.4rem}.hero h1 span{font-size:1.4rem}.hero p{max-width:100%;margin:0 auto}.card{padding:22px 18px}}</style></head><body>
<div class="glow"></div><div class="glow2"></div>
<header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back">← Back</a></header>
<div class="wrap"><div class="hero"><div class="badge">Collector Access</div><h1>Enter The<span>Archive</span></h1><p>Access your orders, collector history and future acquisitions. Every piece carries a story.</p></div><div class="card"><h2>Welcome Back</h2><label>Email</label><input type="email" id="email" placeholder="collector@email.com"><label>Password</label><input type="password" id="password" placeholder="········"><button class="btn"><i class="fas fa-arrow-right"></i> Login</button><div class="divider">or continue with</div><button class="gbtn"><i class="fa-brands fa-google"></i> Google</button><div class="links"><a href="/signup/">Create New Account</a></div></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getAuth,signInWithEmailAndPassword,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
const fc={apiKey:"AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",authDomain:"rudohage.firebaseapp.com",projectId:"rudohage",storageBucket:"rudohage.firebasestorage.app",messagingSenderId:"487042116246",appId:"1:487042116246:web:990d65636addd6d653f0b7"},app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app),params=new URLSearchParams(location.search),redir=params.get("redirect"),API="https://razorpay-backend-6yg5.onrender.com";
function go(){location.href=redir?decodeURIComponent(redir):"/myaccount/"}
function goVerify(){let u="/verify-email/";if(redir)u+="?redirect="+encodeURIComponent(redir);location.href=u}
onAuthStateChanged(auth,async u=>{if(u){const s=await getDoc(doc(db,"users",u.uid)),d=s.exists()?s.data():{};if(d.emailVerified===false)goVerify();else go()}});
document.querySelector(".btn").addEventListener("click",async()=>{const e=document.getElementById("email").value,p=document.getElementById("password").value;try{const uc=await signInWithEmailAndPassword(auth,e,p),ref=doc(db,"users",uc.user.uid),s=await getDoc(ref);if(s.exists()){if(s.data().emailVerified===false){try{await fetch(API+"/send-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:uc.user.email})})}catch(err){}goVerify()}else go()}else{await signOut(auth);alert("Account not found")}}catch(err){alert(err.message)}});
document.querySelector(".gbtn").addEventListener("click",async()=>{try{const prov=new GoogleAuthProvider();prov.setCustomParameters({prompt:"select_account"});const r=await signInWithPopup(auth,prov),s=await getDoc(doc(db,"users",r.user.uid));if(s.exists())go();else{await signOut(auth);alert("Account not found")}}catch(err){alert(err.message)}});
</script>
    <script src="/toast.js"></script>
<script>document.addEventListener('contextmenu',e=>e.preventDefault());document.onkeydown=function(e){if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74))||(e.ctrlKey&&e.keyCode==85))return false}</script>
</body></html>
