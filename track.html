<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" type="image/png" href="logo.png">

<title>RUDOHAGE | Track Order</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#f6f2ea;
font-family:'Manrope',sans-serif;
padding:120px 8%;
color:#111;
text-align:center;
}

.small{
letter-spacing:4px;
font-size:12px;
opacity:.6;
margin-bottom:20px;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:5rem;
margin-bottom:20px;
}

.track-box{
max-width:700px;
margin:auto;
background:white;
padding:40px;
border-radius:30px;
box-shadow:0 10px 40px rgba(0,0,0,.05);
}

input{
width:100%;
padding:18px;
border:none;
background:#f4f4f4;
border-radius:14px;
margin-top:20px;
margin-bottom:20px;
font-size:16px;
}

button{
padding:18px 35px;
border:none;
background:black;
color:white;
border-radius:50px;
cursor:pointer;
}

.result{
margin-top:40px;
}

.status{
display:inline-block;
margin-top:15px;
padding:12px 22px;
background:black;
color:white;
border-radius:50px;
letter-spacing:2px;
}

@media(max-width:768px){

h1{
font-size:2.8rem;
}

body{
padding:90px 20px;
}

}

  .product-header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;

padding:1.3rem 4rem;

background:rgba(246,242,234,0.55);
backdrop-filter:blur(18px);

border-bottom:1px solid rgba(0,0,0,0.08);

display:flex;
align-items:center;
}

.product-brand{
text-decoration:none;
color:#111;
font-family:'Cormorant Garamond',serif;
font-size:2.1rem;
font-weight:600;
letter-spacing:-1px;
}

@media(max-width:768px){

.product-header{
justify-content:center;
padding:10px 0;
text-align:center;
}

.product-brand{
font-size:1.3rem;
width:100%;
text-align:center;
}

}

</style>
</head>

<body>

  <header class="product-header">

<a href="index.html" class="product-brand">
RUDOHAGE
</a>

</header>

<div class="small">
ORDER TRACKING
</div>

<h1>
Track Your Piece
</h1>

<div class="track-box">

<div class="result" id="result">
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",
authDomain: "rudohage.firebaseapp.com",
projectId: "rudohage",
storageBucket: "rudohage.firebasestorage.app",
messagingSenderId: "487042116246",
appId: "1:487042116246:web:990d65636addd6d653f0b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addEventListener("load", async ()=>{

const params = new URLSearchParams(window.location.search);

const orderId = params.get("orderId");

if(!orderId){
alert("Enter Order ID");
return;
}

const orderRef = doc(db,"orders",orderId);

const orderSnap = await getDoc(orderRef);

if(orderSnap.exists()){

const order = orderSnap.data();

document.getElementById("result").innerHTML = `

<h2>${order.product}</h2>

<p>Collector : ${order.name}</p>

<p>City : ${order.city}</p>

<div class="status">
${order.status}
</div>

`;

}else{

document.getElementById("result").innerHTML = `
<p>Order Not Found</p>
`;

}

});

</script>

</body>
</html>
