<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="/logo.png"><title>Reviews | RUDOHAGE</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6f2ea;font-family:'Manrope',sans-serif;color:#111;line-height:1.5;position:relative;overflow-x:hidden}.glow{position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(164,139,116,.12),transparent 70%);pointer-events:none;z-index:0}.hdr{position:fixed;top:0;left:0;width:100%;z-index:999;padding:12px 28px;background:rgba(246,242,234,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.04);display:flex;justify-content:space-between;align-items:center}.brand{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;text-decoration:none;color:#111;letter-spacing:-.5px}.back{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;color:rgba(0,0,0,.45);transition:.3s}.back:hover{color:#111}.wrap{max-width:650px;margin:0 auto;padding:90px 18px 30px;position:relative;z-index:1}.hero{text-align:center;margin-bottom:28px}.hero span{font-size:9px;letter-spacing:4px;opacity:.35;text-transform:uppercase}.hero h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-style:italic;margin:4px 0}.hero p{font-size:.72rem;opacity:.45;max-width:350px;margin:auto;line-height:1.6}.form-box{background:#fff;border-radius:16px;padding:20px 22px;box-shadow:0 3px 16px rgba(0,0,0,.03);margin-bottom:28px;position:relative;overflow:hidden}.form-box::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#a48b74,transparent)}.form-box h3{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;margin-bottom:14px}.form-box input,.form-box select,.form-box textarea{width:100%;padding:10px 13px;margin-bottom:10px;border:none;background:#f5f3ef;border-radius:10px;font-size:.75rem;font-family:'Manrope',sans-serif;outline:none;transition:.3s}.form-box input:focus,.form-box textarea:focus{background:#eeeae3}.form-box textarea{resize:vertical;min-height:70px}.form-box select{appearance:none;-webkit-appearance:none;cursor:pointer;font-weight:600;color:#111}.submit-btn{width:100%;padding:11px;background:#a48b74;color:#fff;border:none;border-radius:50px;cursor:pointer;font-size:.75rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:'Manrope',sans-serif;transition:.3s}.submit-btn:hover{background:#8a715c;transform:translateY(-2px)}.stitle{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(0,0,0,.06)}.rev-card{background:#fff;padding:15px 18px;border-radius:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.02)}.rev-card h3{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;margin-bottom:3px}.rev-card .rs{color:#d4a853;font-size:13px;letter-spacing:1px;margin-bottom:5px}.rev-card p{font-size:.72rem;opacity:.5;line-height:1.6}.fab-share{position:fixed;bottom:24px;right:20px;width:44px;height:44px;border-radius:50%;border:none;background:#111;color:#fff;font-size:18px;cursor:pointer;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:.3s;display:flex;align-items:center;justify-content:center}.fab-share:hover{transform:scale(1.1);background:#a48b74}.sig{text-align:center;padding:24px 0 10px}.sig p{font-size:.6rem;letter-spacing:3px;opacity:.2;text-transform:uppercase}.sig h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem}@media(max-width:500px){.wrap{padding:80px 12px 20px}.hero h1{font-size:1.5rem}}</style></head><body>
<div class="glow"></div>
<header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back">← Back</a></header>
<div class="wrap"><div class="hero"><span>Testimonials</span><h1>Client Impressions</h1><p>Thoughts from collectors and admirers of RUDOHAGE.</p></div><div class="form-box"><h3>Share Your Experience</h3><input type="text" id="reviewName" placeholder="Your Name"><select id="reviewRating"><option value="5">★★★★★</option><option value="4">★★★★</option><option value="3">★★★</option><option value="2">★★</option><option value="1">★</option></select><textarea id="reviewText" placeholder="Write your review..."></textarea><button class="submit-btn" id="publishBtn">Publish Review</button></div><div class="stitle">Latest Reviews</div><div id="reviewsContainer"></div><div class="sig"><p>Not Produced. Crafted.</p><h2>RUDOHAGE</h2></div></div>
<button class="fab-share" onclick="shareWebsite()"><i class="fas fa-share-alt"></i></button>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";import{getFirestore,collection,addDoc,getDocs,query,orderBy,limit}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const fc={apiKey:"AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",authDomain:"rudohage.firebaseapp.com",projectId:"rudohage",storageBucket:"rudohage.firebasestorage.app",messagingSenderId:"487042116246",appId:"1:487042116246:web:990d65636addd6d653f0b7",measurementId:"G-6GLB5PPXMY"},app=initializeApp(fc),db=getFirestore(app);
async function loadReviews(){const c=document.getElementById("reviewsContainer");c.innerHTML="";const s=await getDocs(query(collection(db,"reviews"),orderBy("date","desc"),limit(20)));s.forEach(d=>{const r=d.data();c.innerHTML+=`<div class="rev-card"><h3>${r.name}</h3><div class="rs">${"★".repeat(r.rating)}</div><p>${r.review}</p></div>`})}
document.getElementById("publishBtn").addEventListener("click",async()=>{const n=document.getElementById("reviewName").value.trim(),t=document.getElementById("reviewText").value.trim(),rt=parseInt(document.getElementById("reviewRating").value);if(!n||!t){alert("Fill all fields");return}await addDoc(collection(db,"reviews"),{name:n,review:t,rating:rt,date:Date.now()});document.getElementById("reviewName").value="";document.getElementById("reviewText").value="";loadReviews()});loadReviews();
</script>
<script>async function shareWebsite(){const e={title:"RUDOHAGE",text:"Check out RUDOHAGE handcrafted luxury collection.",url:location.href};if(navigator.share)await navigator.share(e);else{navigator.clipboard.writeText(e.url);alert("Link copied!")}}document.addEventListener("contextmenu",e=>e.preventDefault());document.onkeydown=function(e){if(123==e.keyCode||e.ctrlKey&&e.shiftKey&&(73==e.keyCode||74==e.keyCode)||e.ctrlKey&&85==e.keyCode)return!1};</script>
<script src="/toast.js"></script>
</body></html>
