<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" type="image/png" href="/logo.png"><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#a48b74"><title>RUDOHAGE | Client Impressions</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"></head>
<body><header class="review-header"><a href="index.html">RUDOHAGE</a></header>
<h1>Client Impressions</h1><p class="sub">Thoughts from collectors and admirers of RUDOHAGE.</p>
<div class="form-box"><h2>Share Your Experience</h2><input type="text" id="reviewName" placeholder="Your Name"><select id="reviewRating"><option value="5">★★★★★</option><option value="4">★★★★</option><option value="3">★★★</option><option value="2">★★</option><option value="1">★</option></select><textarea id="reviewText" rows="5" placeholder="Write your review"></textarea><button id="publishBtn">Publish Review</button></div>
<h2 style="margin-top:60px;margin-bottom:25px;text-align:center">Latest Reviews</h2><div id="reviewsContainer"></div><button class="share-btn" onclick="shareWebsite()"><i class="fas fa-share-alt"></i></button>
<style>:root{--bg:#f6f2ea;--text:#111;--accent:#a48b74;--radius:22px}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);font-family:'Manrope',sans-serif;padding:120px 10% 80px;color:var(--text)}h1{font-family:'Cormorant Garamond',serif;font-size:2rem;text-align:center;margin-bottom:10px}.review-header{position:fixed;top:0;left:0;width:100%;padding:20px 40px;background:rgba(246,242,234,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.08);z-index:999}.review-header a{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:#111;text-decoration:none}.sub{text-align:center;opacity:.7;margin-bottom:60px}.review-card{background:rgba(255,255,255,.7);backdrop-filter:blur(12px);padding:25px;border-radius:22px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,.08)}.review-card h3{margin-bottom:10px}.stars{font-size:20px;margin-bottom:10px}.form-box{margin-top:60px;background:#fff;padding:30px;border-radius:22px;box-shadow:0 10px 40px rgba(0,0,0,.08)}input,select,textarea{width:100%;padding:15px;margin-top:10px;margin-bottom:20px;border:none;background:#f3f3f3;border-radius:12px;font-size:15px}button{padding:15px 30px;border:none;border-radius:50px;background:#111;color:#fff;cursor:pointer}button:hover{opacity:.9}.share-btn{position:fixed;bottom:30px;right:30px;width:60px;height:60px;border-radius:50%;border:none;background:#111;color:#fff;font-size:22px;cursor:pointer;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.2);transition:.3s}.share-btn:hover{transform:scale(1.1)}</style>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";import{getFirestore,collection,addDoc,getDocs,query,orderBy,limit}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",authDomain:"rudohage.firebaseapp.com",projectId:"rudohage",storageBucket:"rudohage.firebasestorage.app",messagingSenderId:"487042116246",appId:"1:487042116246:web:990d65636addd6d653f0b7",measurementId:"G-6GLB5PPXMY"};
const app=initializeApp(firebaseConfig),db=getFirestore(app);async function loadReviews(){const e=document.getElementById("reviewsContainer");e.innerHTML="";const t=await getDocs(query(collection(db,"reviews"),orderBy("date","desc"),limit(20)));t.forEach(t=>{const n=t.data();e.innerHTML+=`<div class="review-card"><h3>${n.name}</h3><div class="stars">${"★".repeat(n.rating)}</div><p>${n.review}</p></div>`})}
document.getElementById("publishBtn").addEventListener("click",async()=>{const e=document.getElementById("reviewName").value,t=document.getElementById("reviewText").value,n=parseInt(document.getElementById("reviewRating").value);if(!e||!t){alert("Please fill all fields");return}await addDoc(collection(db,"reviews"),{name:e,review:t,rating:n,date:Date.now()});document.getElementById("reviewName").value="";document.getElementById("reviewText").value="";loadReviews()});loadReviews();
</script>
<script>async function shareWebsite(){const e={title:"RUDOHAGE",text:"Check out RUDOHAGE handcrafted luxury collection.",url:"https://rudohage.com/"};if(navigator.share)await navigator.share(e);else{navigator.clipboard.writeText(e.url);alert("Website link copied!")}}document.addEventListener("contextmenu",e=>e.preventDefault());document.onkeydown=function(e){if(123==e.keyCode||e.ctrlKey&&e.shiftKey&&(73==e.keyCode||74==e.keyCode)||e.ctrlKey&&85==e.keyCode)return!1};</script>
<script src="/toast.js"></script>
</body></html>
