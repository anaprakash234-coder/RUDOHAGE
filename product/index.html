<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Product | RUDOHAGE</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6f2ea;font-family:Manrope,sans-serif;color:#111}.hdr{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:.8rem 2rem;background:rgba(246,242,234,.75);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.04);display:flex;align-items:center;justify-content:space-between}.brand{text-decoration:none;color:#111;font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700}.back{text-decoration:none;color:rgba(20,20,20,.55);font-size:.62rem;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:5px}.main{max-width:1100px;margin:0 auto;padding:95px 3% 30px}.product-grid{display:grid;grid-template-columns:420px 1fr;gap:32px;align-items:start}.gal{display:flex;gap:12px;position:sticky;top:95px}.thumbs{display:flex;flex-direction:column;gap:7px;flex-shrink:0}.thumbs img{width:60px;height:60px;object-fit:cover;border-radius:16px;cursor:pointer;border:2px solid transparent;transition:.25s;opacity:.5}.thumbs img.active,.thumbs img:hover{border-color:#a48b74;opacity:1}.imgbox{flex:1;border-radius:24px;overflow:hidden;background:#f6f2ea;display:flex;align-items:center;justify-content:center;min-height:380px;cursor:pointer}#mainImg{width:100%;max-height:420px;object-fit:contain;border-radius:24px}.ttl{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700}.price{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:700;margin-bottom:16px}.btns{display:flex;gap:10px;margin-bottom:24px}.buy{flex:1;padding:12px 24px;border-radius:50px;font-size:.82rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:none;background:#a48b74;color:#fff;cursor:pointer;display:flex;align-items:center;gap:7px;justify-content:center}.buy:hover{background:#8a715c}.shr{background:#fff;border:1px solid rgba(0,0,0,.1);padding:12px 15px;border-radius:50px;cursor:pointer}.delivery-badge{background:#e8f5e9;padding:12px 16px;border-radius:10px;display:flex;align-items:center;gap:10px;margin-bottom:20px;border:1px solid rgba(46,125,50,.15)}.delivery-badge i{color:#2e7d32}.rel-grid{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px}.rcard{min-width:180px;background:#fff;border-radius:14px;overflow:hidden;flex-shrink:0;cursor:pointer}.rcard img{width:100%;height:140px;object-fit:cover}.rinfo{padding:10px 12px 12px}.login-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:99999}.login-modal.active{display:flex}.login-modal-box{max-width:400px;width:100%;background:#fff;border-radius:20px;padding:40px 32px 32px;text-align:center}.zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:999999;display:none;align-items:center;justify-content:center;padding:30px;cursor:zoom-out}.zoom-overlay.active{display:flex}.zoom-overlay img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:18px}.feature-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0 20px}.feature-item{background:#fff;padding:12px 10px;border-radius:10px;text-align:center}.inbox{background:#f6f2ea;padding:14px 18px;border-radius:12px;margin-bottom:20px}.inbox ul{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:4px}.inbox ul li{font-size:.7rem;opacity:.6;display:flex;align-items:center;gap:6px}.custom-cta{background:#111;color:#fff;padding:14px 18px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px}.custom-cta a{color:#a48b74;font-size:.65rem;font-weight:600;text-transform:uppercase;text-decoration:none;border:1px solid rgba(164,139,116,.3);padding:6px 16px;border-radius:50px}.rev-form{background:#fff;padding:16px 18px;border-radius:14px;margin-top:16px}.rev-form input,.rev-form select,.rev-form textarea{width:100%;padding:10px 12px;margin-bottom:8px;border:none;background:#f5f3ef;border-radius:10px;font-family:Manrope,sans-serif;outline:none}.sbtn{background:#111;color:#fff;padding:11px 22px;border:none;border-radius:50px;cursor:pointer;font-weight:600;text-transform:uppercase}.sig{text-align:center;padding:40px 20px 30px}.sig h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700}@media(max-width:768px){.product-grid{grid-template-columns:1fr}.gal{flex-direction:column-reverse;position:relative;top:auto}.thumbs{flex-direction:row;overflow-x:auto}.thumbs img{width:50px;height:50px;flex-shrink:0}.imgbox{min-height:200px}#mainImg{max-height:320px}.feature-grid{grid-template-columns:1fr 1fr}.inbox ul{grid-template-columns:1fr}.custom-cta{flex-direction:column;text-align:center}.main{padding-left:0;padding-right:0}.main .product-grid>div:last-child{padding:0 4%}}</style></head><body><header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back"><i class="fas fa-arrow-left"></i> Back</a></header><div class="login-modal" id="loginModal"><div class="login-modal-box"><h2>Login Required</h2><div class="modal-btns" style="display:flex;gap:10px;margin-top:16px"><button class="btn-cancel" id="modalCancel" style="flex:1;padding:14px;border:none;border-radius:50px;background:#f3f1ee;cursor:pointer">Cancel</button><button class="btn-login" id="modalLogin" style="flex:1;padding:14px;border:none;border-radius:50px;background:#a48b74;color:#fff;cursor:pointer">Login</button></div></div></div><div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()"><img id="zoomImg" src=""></div><div class="main" id="productContainer"><div id="loadingState" class="loading-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh"><div style="width:50px;height:50px;border:2px solid rgba(164,139,116,.15);border-top:2px solid #a48b74;border-radius:50%;animation:s 1s infinite}@keyframes s{to{transform:rotate(360deg)}}"></div></div><div id="productContent" style="display:none"></div></div><div class="rel-block" id="similarProducts" style="display:none;max-width:1100px;margin:20px auto 0;padding:15px 3% 20px"><h2 style="font-family:'Cormorant Garamond',serif;text-align:center;margin-bottom:18px">Similar Products</h2><div class="rel-grid" id="similarGrid"></div></div><div class="rev-block" id="reviewsSection" style="display:none;max-width:1100px;margin:0 auto;padding:15px 3% 40px"><h2 style="font-family:'Cormorant Garamond',serif;margin-bottom:14px">Reviews</h2><div id="reviewsContainer"></div><div class="rev-form"><h4>Write a Review</h4><input type="text" id="reviewName" placeholder="Your Name"><select id="reviewRating"><option value="5">★★★★★</option><option value="4">★★★★</option><option value="3">★★★</option><option value="2">★★</option><option value="1">★</option></select><textarea id="reviewText" placeholder="Share your experience..."></textarea><button class="sbtn" id="publishBtn">Publish</button></div></div><div class="sig"><p style="letter-spacing:4px;text-transform:uppercase;opacity:.3;font-size:.62rem">Not Produced. Crafted.</p><h2>RUDOHAGE</h2></div><script src="https://checkout.razorpay.com/v1/checkout.js"></script><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";import{getFirestore,collection,addDoc,getDocs,query,orderBy}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",authDomain:"rudohage.com",projectId:"rudohage",storageBucket:"rudohage.firebasestorage.app",messagingSenderId:"487042116246",appId:"1:487042116246:web:990d65636addd6d653f0b7"};const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app),BACKEND_URL="https://razorpay-backend-6yg5.onrender.com";const PRODUCTS={'1':{name:"Inferno Core",price:3000,images:["/image/fire-clock-1.png","/image/fire-clock-14.png","/image/fire-clock-15.png","/image/fire-clock-16.png"],description:"Inferno Core",story:"Inspired by flame",material:"Premium Wood",finish:"Matte",shortDesc:"Flame-inspired clock",dimensions:"6\" × 4\" × 4\"",weight:"420g",care:["Wipe with soft cloth","Avoid moisture"],delivery:"3-5 Days",features:["Handcrafted","Solid Wood"],inbox:["Wood Clock","Cloth"]},'2':{name:"Crimson Orbit",price:2500,images:["/image/fire-clock-2.png","/image/fire-clock-11.png","/image/fire-clock-12.png","/image/fire-clock-13.png"],description:"Crimson Orbit",story:"Celestial layers",material:"Premium Wood",finish:"Matte",shortDesc:"Layered clock",dimensions:"7\" × 3.5\" × 3.5\"",weight:"380g",care:["Dust with brush"],delivery:"3-5 Days",features:["Four Layer"],inbox:["Layered Clock"]},'3':{name:"Ember Crown",price:2500,images:["/image/fire-clock-3.png","/image/fire-clock-8.png","/image/fire-clock-9.png","/image/fire-clock-10.png"],description:"Ember Crown",story:"Flame patination",material:"Premium Wood",finish:"Flame-Colored",shortDesc:"Unique flame art",dimensions:"5.5\" × 3\" × 3\"",weight:"350g",care:["Wipe with cloth"],delivery:"3-5 Days",features:["Heat-Flame"],inbox:["Flame Clock"]}};let cu=null,pid=null,pp=null;const $=id=>document.getElementById(id),showLogin=p=>{pp=p;$('loginModal').classList.add('active')},hideLogin=()=>{$('loginModal').classList.remove('active')};$('modalCancel').onclick=hideLogin;$('modalLogin').onclick=()=>{if(pp){const p=pp;hideLogin();createOrder(p)}};onAuthStateChanged(auth,u=>{cu=u;if(u){const oid=localStorage.getItem('pendingOrderId'),p=localStorage.getItem('pendingProduct'),pr=localStorage.getItem('pendingPrice');if(oid){localStorage.removeItem('pendingOrderId');localStorage.removeItem('pendingProduct');localStorage.removeItem('pendingPrice');window.location.href=`/checkout/?orderId=${oid}&product=${encodeURIComponent(p||'')}&price=${pr||0}`}}});const url=new URLSearchParams(location.search);pid=url.get('id');async function loadProduct(){const le=$('loadingState'),ce=$('productContent');if(!pid||!PRODUCTS[pid]){le.innerHTML='Product Not Found';return}const p=PRODUCTS[pid];document.title=`${p.name}|RUDOHAGE`;const th=p.images.map((img,i)=>`<img src="${img}" onclick="window.setMain(this)" class="${i===0?'active':''}" onerror="this.style.display='none'" loading="lazy">`).join('');const feats=p.features?p.features.map(f=>`<div class="feature-item"><i class="fas fa-check-circle"></i><span>${f}</span></div>`).join(''):'';const inboxItems=p.inbox?p.inbox.map(i=>`<li><i class="fas fa-box"></i> ${i}</li>`).join(''):'';ce.style.display='block';ce.innerHTML=`<div class="product-grid"><div class="gal"><div class="thumbs">${th}</div><div class="imgbox" onclick="openZoom('${p.images[0]}')"><img id="mainImg" src="${p.images[0]}" alt="${p.name}" onerror="this.src='/logo.png'"></div></div><div><div class="bread" style="font-size:.62rem;opacity:.4;text-transform:uppercase">RUDOHAGE / ${p.name}</div><h1 class="ttl">${p.name}</h1><div class="stars" style="color:#d4a853;margin-bottom:14px">★★★★★</div><div class="price">₹${p.price.toLocaleString()}</div><div class="feature-grid">${feats}</div><div class="delivery-badge"><i class="fas fa-truck"></i><span>Free Shipping • ${p.delivery}</span></div><div class="inbox"><h4><i class="fas fa-box-open"></i> In the Box</h4><ul>${inboxItems}</ul></div><div class="custom-cta"><div><i class="fas fa-pencil-alt"></i><span>Custom creation?</span></div><a href="/contact/">Inquire</a></div><div class="btns"><button class="buy" id="buyBtn"><i class="fas fa-bolt"></i> Buy Now</button><button class="shr" id="shareBtn"><i class="fas fa-share-alt"></i></button></div></div></div>`;le.style.display='none';$('reviewsSection').style.display='block';$('similarProducts').style.display='block';loadReviews(pid);loadSimilar(pid);$('buyBtn').onclick=()=>placeOrder(p);$('shareBtn').onclick=()=>{if(navigator.share)navigator.share({title:p.name,url:location.href});else{navigator.clipboard.writeText(location.href);alert('Copied!')}}}window.setMain=function(el){const main=$('mainImg');main.src=el.src;main.onclick=function(){openZoom(el.src)};document.querySelectorAll('.thumbs img').forEach(t=>t.classList.remove('active'));el.classList.add('active')};window.openZoom=function(src){const z=$('zoomOverlay'),zi=$('zoomImg');zi.src=src;z.classList.add('active')};window.closeZoom=function(){$('zoomOverlay').classList.remove('active')};document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZoom()});function loadSimilar(id){const g=$('similarGrid');g.innerHTML='';const o=Object.entries(PRODUCTS).filter(([i])=>i!==id);if(!o.length){$('similarProducts').style.display='none';return}o.forEach(([i,p])=>{g.innerHTML+=`<div class="rcard" onclick="location.href='/product/?id=${i}'"><img src="${p.images[0]}" alt="${p.name}" loading="lazy" onerror="this.src='/logo.png'"><div class="rinfo"><h3>${p.name}</h3><p class="rpr" style="color:#a48b74;font-weight:600">₹${p.price}</p></div></div>`})}async function createOrder(p){try{const b=$('buyBtn');if(b){b.disabled=true;b.innerHTML='<i class="fas fa-spinner fa-spin"></i>'}const r=await fetch(`${BACKEND_URL}/create-order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product:p.name,cod:false})}),d=await r.json();if(d.id){localStorage.setItem('pendingOrderId',d.id);localStorage.setItem('pendingProduct',p.name);localStorage.setItem('pendingPrice',p.price);location.href=`/login/?redirect=${encodeURIComponent(location.href)}`}else{alert('Failed');if(b){b.disabled=false;b.innerHTML='<i class="fas fa-bolt"></i> Buy Now'}}}catch(e){alert('Error');const b=$('buyBtn');if(b){b.disabled=false;b.innerHTML='<i class="fas fa-bolt"></i> Buy Now'}}}async function placeOrder(p){if(!cu){showLogin(p);return}try{const b=$('buyBtn');b.disabled=true;b.innerHTML='<i class="fas fa-spinner fa-spin"></i>';const r=await fetch(`${BACKEND_URL}/create-order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product:p.name,cod:false})}),d=await r.json();if(d.id){localStorage.setItem('currentOrderId',d.id);localStorage.setItem('currentProduct',p.name);location.href=`/checkout/?orderId=${d.id}&product=${encodeURIComponent(p.name)}&price=${p.price}`}else{alert('Failed');const b2=$('buyBtn');b2.disabled=false;b2.innerHTML='<i class="fas fa-bolt"></i> Buy Now'}}catch(e){alert('Error');const b=$('buyBtn');b.disabled=false;b.innerHTML='<i class="fas fa-bolt"></i> Buy Now'}}async function loadReviews(productId){const c=$('reviewsContainer');c.innerHTML='Loading...';try{const sn=await getDocs(query(collection(db,`product${productId}_reviews`),orderBy("date","desc")));if(sn.empty){c.innerHTML='No reviews yet.';return}c.innerHTML='';sn.forEach(d=>{const data=d.data();c.innerHTML+=`<div class="rev-card" style="background:#fff;padding:14px;border-radius:12px;margin-bottom:8px"><h4>${data.name||'Anonymous'}</h4><div class="rs" style="color:#d4a853">${'★'.repeat(data.rating||5)}</div><p>${data.review}</p></div>`})}catch(e){c.innerHTML='Unable to load reviews.'}}$('publishBtn').onclick=async()=>{if(!cu){showLogin(null);return}const name=$('reviewName').value.trim(),rating=parseInt($('reviewRating').value),review=$('reviewText').value.trim();if(!name||!review){alert('Fill all fields');return}try{await addDoc(collection(db,`product${pid}_reviews`),{name,rating,review,date:Date.now()});$('reviewName').value='';$('reviewText').value='';alert('✅ Published!');loadReviews(pid)}catch(e){alert('Failed')}};loadProduct();</script></body></html>
