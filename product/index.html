radius:14px;overflow:hidden;background:#fff}#mainImg{width:100%;aspect-ratio:1;object-fit:cover}.ttl{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;line-height:1.1}.price{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:700;margin:8px 0}.btns{display:flex;gap:10px;margin:16px 0}.buy{flex:1;padding:12px 24px;border-radius:50px;font-weight:600;text-transform:uppercase;border:none;background:var(--a);color:#fff;cursor:pointer}.buy:hover{background:#8a715c}.shr{background:#fff;border:1px solid rgba(0,0,0,.1);padding:12px 15px;border-radius:50px;cursor:pointer}.login-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:99999;padding:20px}.login-modal.active{display:flex}.login-modal-box{max-width:400px;width:100%;background:#fff;border-radius:20px;padding:40px 32px;text-align:center}.login-modal-box h2{font-family:'Cormorant Garamond',serif;font-size:24px;margin:8px 0}.modal-btns{display:flex;gap:10px;margin-top:20px}.modal-btns button{flex:1;padding:14px;border:none;border-radius:50px;font-weight:600;cursor:pointer}.btn-cancel{background:#f3f1ee}.btn-login{background:var(--a);color:#fff}.rel-grid{display:flex;gap:14px;overflow-x:auto;padding:10px 0}.rcard{min-width:180px;background:#fff;border-radius:14px;padding:10px;cursor:pointer}.rcard img{width:100%;height:140px;object-fit:cover;border-radius:8px}.rcard h3{font-family:'Cormorant Garamond',serif}.rev-card{background:#fff;padding:14px 16px;border-radius:12px;margin-bottom:8px}.rev-form{background:#fff;padding:16px;border-radius:14px;margin-top:16px}.rev-form input,.rev-form select,.rev-form textarea{width:100%;padding:10px;margin-bottom:8px;border:none;background:#f5f3ef;border-radius:10px;font-family:'Manrope',sans-serif}.sbtn{background:#111;color:#fff;padding:11px 22px;border:none;border-radius:50px;font-weight:600;cursor:pointer}.sbtn:hover{background:var(--a)}.sig{text-align:center;padding:40px 20px 30px;opacity:.3;font-family:'Cormorant Garamond',serif}@media(max-width:768px){.product-grid{grid-template-columns:1fr}.gal{flex-direction:column-reverse;position:relative;top:auto}.thumbs{flex-direction:row;overflow-x:auto}.thumbs img{width:44px;height:44px}.rcard{min-width:140px}}</style></head><body><header class="hdr"><a href="/" class="brand">RUDOHAGE</a><a href="/" class="back"><i class="fas fa-arrow-left"></i> Back</a></header><div class="login-modal" id="loginModal"><div class="login-modal-box"><i class="fas fa-lock" style="font-size:28px;color:var(--a)"></i><h2>Login Required</h2><p style="color:#888;margin:8px 0">Please log in to continue.</p><div class="modal-btns"><button class="btn-cancel" id="modalCancel">Cancel</button><button class="btn-login" id="modalLogin">Login Now</button></div></div></div><div class="main" id="productContainer"><div id="loadingState" class="loading-state"><div class="loader-spinner"></div></div><div id="productContent" style="display:none"></div></div><div class="main" style="padding-top:0" id="similarProducts" style="display:none"><h2 style="font-family:'Cormorant Garamond',serif;margin:10px 0">Similar Products</h2><div class="rel-grid" id="similarGrid"></div></div><div class="main" style="padding-top:0" id="reviewsSection" style="display:none"><h2 style="font-family:'Cormorant Garamond',serif;margin:10px 0">Reviews</h2><div id="reviewsContainer"></div><div class="rev-form"><h4 style="font-family:'Cormorant Garamond',serif;font-size:1rem">Write a Review</h4><input type="text" id="reviewName" placeholder="Your Name"><select id="reviewRating"><option value="5">★★★★★</option><option value="4">★★★★</option><option value="3">★★★</option><option value="2">★★</option><option value="1">★</option></select><textarea id="reviewText" placeholder="Share your experience..."></textarea><button class="sbtn" id="publishBtn">Publish</button></div></div><div class="sig"><p>Not Produced. Crafted.</p><h2>RUDOHAGE</h2></div><script src="https://checkout.razorpay.com/v1/checkout.js"></script><script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import{getFirestore,collection,addDoc,getDocs,query,orderBy}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCNThX_JX4vI8ZP3KZOBTiCwtZlDdgQ51E",authDomain:"rudohage.com",projectId:"rudohage",storageBucket:"rudohage.firebasestorage.app",messagingSenderId:"487042116246",appId:"1:487042116246:web:990d65636addd6d653f0b7"});
const auth=getAuth(app),db=getFirestore(app),BACKEND_URL="https://razorpay-backend-6yg5.onrender.com",PRODUCTS={1:{name:"Inferno Core",price:3000,images:["/image/fire-clock-1.png","/image/fire-clock-14.png","/image/fire-clock-15.png","/image/fire-clock-16.png"],description:"pure wood crafted material. with precision crafted by hand.full polished and colured with red using spray.",material:"Premium Wood",finish:"Matte",shortDesc:"Flame-colored wood clock"},2:{name:"Crimson Orbit",price:2500,images:["/image/fire-clock-2.png","/image/fire-clock-11.png","/image/fire-clock-12.png","/image/fire-clock-13.png"],description:"pure wood hand crafted material. in a round four layer towards the needle of the clock thats look asthetic.",material:"Premium Wood",finish:"Matte",shortDesc:"Round layered wood clock"},3:{name:"Ember Crown",price:2500,images:["/image/fire-clock-3.png","/image/fire-clock-8.png","/image/fire-clock-9.png","/image/fire-clock-10.png"],description:"pure hand crafted material. i used the heat flames to colour of thre top thats look more satisfying.",material:"Premium Wood",finish:"Flame-Colored",shortDesc:"Heat-flame colored artisan clock"}};
let currentUser=null,currentProductId=null,pendingLoginProduct=null;
const url=new URLSearchParams(location.search),productId=url.get('id');currentProductId=productId;
const $=id=>document.getElementById(id),showModal=p=>{pendingLoginProduct=p;$('loginModal').classList.add('active')},hideModal=()=>{$('loginModal').classList.remove('active');pendingLoginProduct=null};
$('modalCancel').onclick=hideModal;$('modalLogin').onclick=()=>{if(pendingLoginProduct){const p=pendingLoginProduct;hideModal();createOrderAndRedirect(p)}};$('loginModal').onclick=e=>{if(e.target===e.currentTarget)hideModal()};
onAuthStateChanged(auth,user=>{currentUser=user;if(user){const id=localStorage.getItem('pendingOrderId'),p=localStorage.getItem('pendingProduct'),pr=localStorage.getItem('pendingPrice');if(id){localStorage.removeItem('pendingOrderId');localStorage.removeItem('pendingProduct');localStorage.removeItem('pendingPrice');location.href=`/checkout/?orderId=${id}&product=${encodeURIComponent(p||'')}&price=${pr||0}`}}});
async function createOrderAndRedirect(product){try{const btn=$('buyBtn');if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Creating...'}const res=await fetch(`${BACKEND_URL}/create-order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product:product.name,cod:false})}),data=await res.json();if(data.id){localStorage.setItem('pendingOrderId',data.id);localStorage.setItem('pendingProduct',product.name);localStorage.setItem('pendingPrice',product.price);location.href=`/login/?redirect=${encodeURIComponent(location.href)}`}else{alert('Failed');if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-bolt"></i> Buy Now'}}}catch(e){alert('Network error');console.error(e);const btn=$('buyBtn');if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-bolt"></i> Buy Now'}}}
async function placeOrder(product){if(!currentUser)return showModal(product);try{const btn=$('buyBtn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Processing...';const res=await fetch(`${BACKEND_URL}/create-order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product:product.name,cod:false})}),data=await res.json();if(data.id){localStorage.setItem('currentOrderId',data.id);localStorage.setItem('currentProduct',product.name);location.href=`/checkout/?orderId=${data.id}&product=${encodeURIComponent(product.name)}&price=${product.price}`}else alert('Failed')}catch(e){alert('Network error');console.error(e)}finally{const btn=$('buyBtn');btn.disabled=false;btn.innerHTML='<i class="fas fa-bolt"></i> Buy Now'}}
window.setMain=function(el){$('mainImg').src=el.src;document.querySelectorAll('.thumbs img').forEach(t=>t.classList.remove('active'));el.classList.add('active')};
async function loadProduct(){const loading=$('loadingState'),content=$('productContent');if(!productId||!PRODUCTS[productId]){loading.innerHTML='<div style="text-align:center;padding:60px 20px"><i class="fas fa-exclamation-triangle" style="font-size:48px;color:#d32f2f"></i><h3 style="font-family:Cormorant Garamond,serif;font-size:24px">Not Found</h3><a href="/" style="color:#a48b74">← Back</a></div>';return}const p=PRODUCTS[productId];document.title=`${p.name} | RUDOHAGE`;document.getElementById('pageDesc').content=p.description;const thumbs=p.images.map((img,i)=>`<img src="${img}" onclick="window.setMain(this)" class="${i===0?'active':''}" onerror="this.style.display='none'">`).join('');content.style.display='block';content.innerHTML=`<div class="product-grid"><div class="gal"><div class="thumbs">${thumbs}</div><div class="imgbox"><img id="mainImg" src="${p.images[0]}" alt="${p.name}" onerror="this.src='/logo.png'"></div></div><div><div style="font-size:.62rem;opacity:.4;letter-spacing:1.5px;text-transform:uppercase">RUDOHAGE / ${p.name}</div><h1 class="ttl">${p.name}</h1><p style="opacity:.5;font-size:.82rem">Handcrafted by RUDOHAGE</p><div style="color:#d4a853;margin:8px 0">★★★★★ <span style="opacity:.4;font-size:.62rem">5.0</span></div><div class="price">₹${p.price.toLocaleString()}<small style="font-size:.62rem;opacity:.4;margin-left:4px">incl. GST</small></div><div style="display:inline-block;background:rgba(164,139,116,.12);color:var(--a);padding:4px 12px;border-radius:50px;font-size:10px;font-weight:600;margin-bottom:10px"><i class="fas fa-tag"></i> Limited Edition</div><div style="display:flex;flex-direction:column;gap:6px;margin:12px 0"><div><i class="fas fa-check-circle" style="color:var(--a)"></i> One of One — Never Reproduced</div><div><i class="fas fa-tree" style="color:var(--a)"></i> ${p.material}</div><div><i class="fas fa-paint-brush" style="color:var(--a)"></i> ${p.finish}</div></div><div style="display:flex;gap:20px;flex-wrap:wrap;margin:12px 0;font-size:.62rem;opacity:.5"><div><i class="fas fa-truck" style="color:var(--a)"></i> Free Shipping</div><div><i class="fas fa-clock" style="color:var(--a)"></i> Dispatch 3-5 Days</div></div><div class="btns"><button class="buy" id="buyBtn"><i class="fas fa-bolt"></i> Buy Now</button><button class="shr" id="shareBtn"><i class="fas fa-share-alt"></i></button></div><div style="background:#111;color:#fff;padding:12px 16px;border-radius:12px;font-size:.62rem;display:flex;align-items:center;gap:8px"><i class="fas fa-archive" style="color:var(--a)"></i> <strong>Active Piece</strong> — Never reproduced</div><div style="margin:16px 0"><h3 style="font-family:'Cormorant Garamond',serif;font-size:1.05rem">The Story</h3><p style="font-size:.82rem;opacity:.55">${p.description}</p></div><div><h3 style="font-family:'Cormorant Garamond',serif;font-size:1.05rem">Specifications</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:.82rem;opacity:.5"><span style="text-transform:uppercase;letter-spacing:1px;font-size:.62rem">Material</span><span>${p.material}</span></div><div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:.82rem;opacity:.5"><span style="text-transform:uppercase;letter-spacing:1px;font-size:.62rem">Finish</span><span>${p.finish}</span></div><div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:.82rem;opacity:.5"><span style="text-transform:uppercase;letter-spacing:1px;font-size:.62rem">Handmade</span><span>Yes</span></div><div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:.82rem;opacity:.5"><span style="text-transform:uppercase;letter-spacing:1px;font-size:.62rem">Collection</span><span>RUDOHAGE</span></div></div></div></div></div>`;setTimeout(()=>{loading.style.opacity='0';setTimeout(()=>{loading.style.display='none'},500)},300);$('reviewsSection').style.display='block';$('similarProducts').style.display='block';loadReviews(productId);loadSimilarProducts(productId);$('buyBtn').addEventListener('click',()=>placeOrder(p));$('shareBtn').addEventListener('click',async()=>{if(navigator.share)await navigator.share({title:p.name,url:location.href});else{navigator.clipboard.writeText(location.href);alert('Link copied!')}})}
async function loadSimilarProducts(id){const grid=$('similarGrid');grid.innerHTML='';const others=Object.entries(PRODUCTS).filter(([k])=>k!==id);if(!others.length){$('similarProducts').style.display='none';return}others.forEach(([k,p])=>{grid.innerHTML+=`<div class="rcard" onclick="location.href='/product/?id=${k}'"><img src="${p.images[0]}" alt="${p.name}" loading="lazy" onerror="this.src='/logo.png'"><h3>${p.name}</h3><p style="color:var(--a);font-weight:600">₹${p.price.toLocaleString()}</p><p style="font-size:10px;opacity:.4">${p.shortDesc||''}</p></div>`})}
async function loadReviews(id){const c=$('reviewsContainer');c.innerHTML='<p style="opacity:.4;font-size:.7rem">Loading...</p>';try{const snap=await getDocs(query(collection(db,`product${id}_reviews`),orderBy("date","desc")));if(snap.empty){c.innerHTML='<p style="opacity:.4;font-size:.7rem">No reviews yet.</p>';return}c.innerHTML='';snap.forEach(d=>{const data=d.data();c.innerHTML+=`<div class="rev-card"><h4>${data.name||'Anonymous'}</h4><div style="color:#d4a853;font-size:12px">${'★'.repeat(data.rating||5)}</div><p style="opacity:.55;font-size:.82rem">${data.review}</p></div>`})}catch(e){c.innerHTML='<p style="opacity:.4;font-size:.7rem">Error loading reviews.</p>';console.error(e)}}
$('publishBtn').addEventListener('click',async()=>{if(!currentUser)return showModal(null);const name=$('reviewName').value.trim(),rating=parseInt($('reviewRating').value),review=$('reviewText').value.trim();if(!name||!review)return alert('Fill all fields.');try{await addDoc(collection(db,`product${productId}_reviews`),{name,rating,review,date:Date.now()});$('reviewName').value='';$('reviewText').value='';alert('✓ Published!');loadReviews(productId)}catch(e){alert('Failed.');console.error(e)}});
loadProduct();
</script></body></html>
