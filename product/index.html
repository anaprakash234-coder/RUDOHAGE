lm.onclick=e=>{if(e.target===lm)lm.classList.remove('active')};g('C').onclick=()=>lm.classList.remove('active');g('LN').onclick=()=>{if(cp){const p=cp;lm.classList.remove('active');co(p)}};onAuthStateChanged(auth,user=>{u=user;if(user){const oid=localStorage.getItem('pendingOrderId'),p=localStorage.getItem('pendingProduct'),pr=localStorage.getItem('pendingPrice');if(oid){localStorage.removeItem('pendingOrderId');localStorage.removeItem('pendingProduct');localStorage.removeItem('pendingPrice');location.href=`/checkout/?orderId=${oid}&product=${encodeURIComponent(p||'')}&price=${pr||0}`}}});
async function lp(){const le=g('ls'),ce=g('pd');if(!pid||!P[pid]){le.innerHTML=`<div class="error-state"><i class="fas fa-exclamation-triangle"></i><h3 style="font-family:'Cormorant Garamond',serif;font-size:24px">Product Not Found</h3><p style="color:#888;font-size:14px">Browse our collection.</p><a href="/" style="display:inline-block;margin-top:15px;color:#a48b74;">← Back</a></div>`;return}const p=P[pid];document.title=`${p.n}|RUDOHAGE`;const th=p.im.map((img,i)=>`<img src="${img}" onclick="window.sm(this)" class="${i===0?'active':''}" onerror="this.style.display='none'">`).join('');ce.style.display='block';ce.innerHTML=`<div class="product-grid"><div class="gal"><div class="thumbs">${th}</div><div class="imgbox"><img id="mi" src="${p.im[0]}" alt="${p.n}" onerror="this.src='/logo.png'"></div></div><div><div class="bread">RUDOHAGE / ${p.n}</div><h1 class="ttl">${p.n}</h1><p class="sub">Handcrafted by RUDOHAGE</p><div class="stars">★★★★★ <span>5.0</span></div><div class="price">₹${p.p.toLocaleString()}<small>incl. GST</small></div><div class="badge"><i class="fas fa-tag"></i> Limited Edition</div><div class="high"><div><i class="fas fa-check-circle"></i> One of One — Never Reproduced</div><div><i class="fas fa-tree"></i> ${p.mat}</div><div><i class="fas fa-paint-brush"></i> ${p.fin}</div></div><div class="delivery-badge"><i class="fas fa-truck"></i><span>Free Shipping • ${p.del||"3-5 Days"}</span></div><div class="del"><div><i class="fas fa-truck"></i> Free Shipping</div><div><i class="fas fa-clock"></i> Dispatch 3-5 Days</div><div><i class="fas fa-box"></i> Secure Packaging</div></div><div class="specs-strip"><div><i class="fas fa-tree"></i> ${p.mat}</div><div><i class="fas fa-paint-brush"></i> ${p.fin}</div><div><i class="fas fa-hand-sparkles"></i> Handmade</div></div><div class="btns"><button class="buy" id="bb"><i class="fas fa-bolt"></i> Buy Now</button><button class="shr" id="sb"><i class="fas fa-share-alt"></i></button></div><div class="arch"><i class="fas fa-archive"></i> <strong>Active Piece</strong> — Never reproduced</div><div class="story"><h3>The Story</h3><p>${p.st||p.d}</p></div><div class="specs-block"><h3>Specifications</h3><div class="sgrid"><div><span>Material</span><span>${p.mat}</span></div><div><span>Finish</span><span>${p.fin}</span></div><div><span>Dimensions</span><span>${p.dim||"N/A"}</span></div><div><span>Weight</span><span>${p.wt||"N/A"}</span></div><div><span>Handmade</span><span>Yes</span></div><div><span>Collection</span><span>RUDOHAGE</span></div></div></div><div class="care-section"><h3>Care</h3><p>${p.ca?p.ca.map(c=>`<i class="fas fa-check-circle"></i> ${c}<br>`).join(''):'<i class="fas fa-check-circle"></i> Wipe with soft cloth<br><i class="fas fa-check-circle"></i> Avoid moisture'}</p></div></div></div>`;setTimeout(()=>{le.style.opacity='0';setTimeout(()=>{le.style.display='none'},500)},300);g('rs').style.display='block';g('sp').style.display='block';lr(pid);lsim(pid);g('bb').onclick=()=>po(p);g('sb').onclick=async()=>{if(navigator.share)await navigator.share({title:p.n,url:location.href});else{navigator.clipboard.writeText(location.href);alert('Link copied!')}}}

async function po(p){if(!u){cp=p;lm.classList.add('active');return}try{const b=g('bb');b.disabled=true;b.innerHTML='<i class="fas fa-spinner fa-spin"></i> Processing...';const r=await fetch(`${B}/create-order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product:p.n,cod:false})});const d=await r.json();if(d.id){localStorage.setItem('currentOrderId',d.id);localStorage.setItem('currentProduct',p.n);location.href=`/checkout/?orderId=${d.id}&product=${encodeURIComponent(p.n)}&price=${p.p}`}else{alert('Failed.');const b2=g('bb');b2.disabled=false;b2.innerHTML='<i class="fas fa-bolt"></i> Buy Now'}}catch(e){alert('Network error.');const b=g('bb');b.disabled=false;b.innerHTML='<i class="fas fa-bolt"></i> Buy Now'}}
